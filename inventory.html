<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Air Jordon HVAC — Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--surface:#0e1018;--card:#13161f;--card2:#181c28;
  --border:#1e2235;--border2:#252b40;
  --red:#e53e3e;--red-dim:rgba(229,62,62,0.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);
  --green:#10b981;--green-dim:rgba(16,185,129,0.12);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);
  --purple:#8b5cf6;--text:#e2e8f0;--text2:#94a3b8;--muted:#475569;
  --font-d:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* HEADER */
header{background:linear-gradient(135deg,#080a12 0%,#0c1019 50%,#080a12 100%);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;gap:14px;flex-shrink:0;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;top:0;left:0;width:25%;height:100%;background:linear-gradient(90deg,rgba(229,62,62,0.05) 0%,transparent 100%);}
header::after{content:'';position:absolute;top:0;right:0;width:25%;height:100%;background:linear-gradient(270deg,rgba(59,130,246,0.05) 0%,transparent 100%);}
.h-logo{height:38px;width:38px;object-fit:contain;filter:drop-shadow(0 2px 10px rgba(229,62,62,0.4));flex-shrink:0;z-index:1;}
.h-brand{z-index:1;}
.h-name{font-family:var(--font-d);font-size:15px;font-weight:800;color:#fff;letter-spacing:0.04em;line-height:1.2;}
.h-sub2{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;}
.h-div{width:1px;height:28px;background:var(--border);flex-shrink:0;z-index:1;}
.h-title{font-family:var(--font-d);font-size:20px;font-weight:900;color:var(--red);letter-spacing:0.08em;text-transform:uppercase;z-index:1;}
.h-right{margin-left:auto;display:flex;align-items:center;gap:8px;z-index:1;}
.h-sync{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);}
.h-badge{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:0.06em;padding:3px 10px;border-radius:6px;text-transform:uppercase;}
.admin{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,0.25);}
.employee{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.25);}
.h-logout{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:var(--font-b);font-size:11px;cursor:pointer;padding:4px 10px;transition:all 0.15s;}
.h-logout:hover{border-color:var(--red);color:var(--red);}
/* STATS */
.stats-bar{display:flex;gap:1px;background:var(--border);flex-shrink:0;}
.stat-pill{flex:1;padding:10px 16px;background:var(--surface);text-align:center;}
.stat-v{font-family:var(--font-d);font-size:22px;font-weight:800;line-height:1;}
.stat-l{font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
/* TOOLBAR */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.search-wrap{position:relative;flex:1;min-width:180px;}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 34px;color:var(--text);font-family:var(--font-b);font-size:13px;outline:none;transition:border-color 0.2s;}
.search-wrap input:focus{border-color:var(--blue);}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.tb-sel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:var(--font-b);font-size:12px;outline:none;cursor:pointer;}
.tb-btn{padding:8px 16px;border-radius:8px;font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap;}
.tb-btn.pri{background:var(--red);color:#fff;}
.tb-btn.pri:hover{background:#c53030;}
/* ITEMS */
.main{flex:1;overflow-y:auto;padding:16px 20px;min-height:0;}
.items-grid{display:flex;flex-direction:column;gap:6px;}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color 0.15s;animation:fadeIn 0.2s ease both;}
.item-card:hover{border-color:var(--border2);}
.item-card.low{border-left:3px solid var(--amber);}
.item-card.critical{border-left:3px solid var(--red);}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{font-family:var(--font-d);font-size:16px;font-weight:700;letter-spacing:0.03em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-desc{font-size:11px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;align-items:center;}
.item-tag{font-size:10px;color:var(--text2);background:var(--card2);border:1px solid var(--border);border-radius:4px;padding:1px 7px;}
.item-qty-block{text-align:center;flex-shrink:0;min-width:54px;}
.item-qty{font-family:var(--font-d);font-size:26px;font-weight:800;line-height:1;}
.item-qty-lbl{font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
.item-actions{display:flex;gap:6px;flex-shrink:0;}
.ia-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:var(--card2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.15s;}
.ia-btn:hover.out{border-color:var(--red);color:var(--red);background:var(--red-dim);}
.ia-btn:hover.inn{border-color:var(--green);color:var(--green);background:var(--green-dim);}
.ia-btn:hover.edit{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center;padding:16px;}
.modal-bg.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.modal-title{font-family:var(--font-d);font-size:19px;font-weight:800;letter-spacing:0.04em;color:#fff;margin-bottom:18px;}
.mf{margin-bottom:12px;}
.mf label{display:block;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;}
.mf input,.mf select,.mf textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--font-b);font-size:13px;outline:none;transition:border-color 0.2s;}
.mf input:focus,.mf select:focus{border-color:var(--blue);}
.mf select option{background:#1a1f2e;}
.mf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mf-row .mf{margin-bottom:0;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}
.m-cancel{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:9px 18px;color:var(--muted);font-family:var(--font-b);font-size:12px;cursor:pointer;transition:all 0.15s;}
.m-cancel:hover{border-color:var(--text2);color:var(--text2);}
.m-save{color:#fff;border:none;border-radius:8px;padding:9px 20px;font-family:var(--font-b);font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
.m-save:hover{opacity:0.85;}
/* LOG */
.log-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;margin-bottom:14px;}
.log-item{display:flex;gap:10px;padding:8px 10px;background:var(--card2);border-radius:7px;}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
/* CAT COLORS */
.cht{background:#f59e0b;}.cpt{background:#ef4444;}.cmr{background:#3b82f6;}
.csa{background:#10b981;}.cli{background:#8b5cf6;}.chs{background:#06b6d4;}.cot{background:#64748b;}
/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--muted);text-align:center;}
.empty-icon{font-size:48px;opacity:0.2;}
/* ANIM */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-8px);}40%,80%{transform:translateX(8px);}}
.shake{animation:shake 0.4s ease;}
@media(max-width:600px){.h-sub2,.h-div,.h-title{display:none;}.main{padding:10px 12px;}.toolbar{padding:8px 12px;}}
</style>
</head>

<script>
// Main App PIN — must match APP_PIN in index.html
var MAIN_APP_PIN = "2580";
var mapBuf = "";

function goToMainApp(){
  mapBuf = "";
  updMap();
  document.getElementById("map-error").textContent = "";
  var modal = document.getElementById("main-app-modal");
  modal.style.display = "flex";
}
function closeMainAppModal(){
  document.getElementById("main-app-modal").style.display = "none";
  mapBuf = "";
  updMap();
}
function mapPress(d){
  if(mapBuf.length>=4)return;
  mapBuf+=d;
  updMap();
  if(mapBuf.length===4){
    setTimeout(function(){
      if(mapBuf===MAIN_APP_PIN){
        window.location.href="index.html";
      } else {
        document.getElementById("map-error").textContent="Incorrect PIN — try again";
        var disp=document.getElementById("map-display");
        disp.style.animation="shake 0.4s ease";
        setTimeout(function(){disp.style.animation="";},500);
        mapBuf="";
        updMap();
      }
    },120);
  }
}
function mapDel(){
  mapBuf=mapBuf.slice(0,-1);
  updMap();
  document.getElementById("map-error").textContent="";
}
function updMap(){
  var s="";
  for(var i=0;i<4;i++)s+=i<mapBuf.length?"●":"–";
  document.getElementById("map-display").textContent=s;
}
document.addEventListener("keydown",function(e){
  if(document.getElementById("main-app-modal").style.display!=="flex")return;
  if(e.key>="0"&&e.key<="9")mapPress(e.key);
  if(e.key==="Backspace")mapDel();
  if(e.key==="Escape")closeMainAppModal();
});
</script>
<script>
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvdHRqb3lpY3pnbHJrYW9kamZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNDk3NTAsImV4cCI6MjA4OTgyNTc1MH0.5LycZbEK23JVyHPvSG3JHqLwumoFLDCkZzLQ4ERLqTE";
const SBH={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY};
let role='employee',items=[],projects=[],editId=null,coMode=null,coId=null;


function lsGet(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
async function sbGet(key,fb){try{var r=await fetch(SB_URL+"/rest/v1/app_data?key=eq."+key+"&select=value",{headers:SBH});var d=await r.json();return(d&&d[0])?d[0].value:fb;}catch{return fb;}}
async function sbSet(key,value){try{await fetch(SB_URL+"/rest/v1/app_data",{method:"POST",headers:Object.assign({"Prefer":"resolution=merge-duplicates"},SBH),body:JSON.stringify({key,value,updated_at:new Date().toISOString()})});}catch{}}
var saveT=null;
function saveItems(next){items=next;lsSet("inv_items",items);clearTimeout(saveT);saveT=setTimeout(function(){sbSet("inv_items",items);},1500);renderItems();renderStats();}
// PIN
function doLogin(){var app=document.getElementById("app");app.style.display="flex";
    document.getElementById("add-btn").style.display="block";
  loadData();
}
function logout(){}
function setSS(s){var c={synced:"#10b981",syncing:"#f59e0b",offline:"#ef4444"};var l={synced:"Synced",syncing:"Syncing…",offline:"Offline"};document.getElementById("sync-dot").style.background=c[s];document.getElementById("sync-lbl").style.color=c[s];document.getElementById("sync-lbl").textContent=l[s];}
async function loadData(){
  setSS("syncing");
  try{
    var cached=lsGet("inv_items",[]);
    if(cached.length){items=cached;renderItems();renderStats();}
    var inv=await sbGet("inv_items",[]);
    var st=await sbGet("takeoff_status",{});
    var manual=await sbGet("takeoff_manual_projects",{});
    if(inv&&inv.length){items=inv;lsSet("inv_items",inv);}
    var pl=[];
    if(st)Object.keys(st).forEach(function(k){var s=st[k];if(s&&(s.status==="Awarded"||s.status==="In Progress"))pl.push({id:k,name:k.split("—")[0].trim()});});
    if(manual)Object.keys(manual).forEach(function(k){pl.push({id:k,name:manual[k].name||k.split("::")[1]||k});});
    projects=pl;populateProjDrops();renderItems();renderStats();renderLocFilter();setSS("synced");
  }catch(e){setSS("offline");}
}
function populateProjDrops(){var o='<option value="">— None —</option>'+projects.map(function(p){return'<option value="'+p.id+'">'+esc(p.name.slice(0,40))+'</option>';}).join("");document.getElementById("f-project").innerHTML=o;document.getElementById("co-project").innerHTML=o;}
function renderLocFilter(){var locs=[...new Set(items.map(function(i){return i.location;}).filter(Boolean))];var sel=document.getElementById("loc-filter");var cur=sel.value;sel.innerHTML='<option value="">All Locations</option>'+locs.map(function(l){return'<option value="'+l+'"'+(l===cur?" selected":"")+'>'+esc(l)+'</option>';}).join("");}
var CC={"Hand Tools":"cht","Power Tools":"cpt","Measuring":"cmr","Safety":"csa","Lifting":"cli","HVAC Specific":"chs","Other":"cot"};
function renderItems(){
  var q=document.getElementById("search-input").value.toLowerCase();
  var cat=document.getElementById("cat-filter").value;
  var loc=document.getElementById("loc-filter").value;
  var f=items.filter(function(it){
    if(cat&&it.category!==cat)return false;
    if(loc&&it.location!==loc)return false;
    if(q&&!it.name.toLowerCase().includes(q)&&!(it.description||"").toLowerCase().includes(q))return false;
    return true;
  });
  var g=document.getElementById("items-grid");
  if(!f.length){g.innerHTML='<div class="empty"><div class="empty-icon">🔧</div><div style="font-size:13px;line-height:1.7;color:var(--muted);max-width:280px;">'+(items.length?"No items match your search.":"No inventory yet. Admin can add items with ＋ Add Item.")+'</div></div>';return;}
  g.innerHTML=f.map(function(it,idx){
    var low=it.threshold&&it.qty>0&&it.qty<=it.threshold;
    var crit=it.qty===0;
    var cls=crit?"critical":low?"low":"";
    var qc=crit?"var(--red)":low?"var(--amber)":"var(--green)";
    var cc=CC[it.category]||"cot";
    var proj=it.projectId?(projects.find(function(p){return p.id===it.projectId;})||{}).name||"":"";
    var editB=role==="admin"?"<button class=\"ia-btn edit\" onclick=\"openEdit('"+it.id+"',event)\" title=\"Edit\">✏</button>":"";
    return "<div class=\"item-card "+cls+"\" style=\"animation-delay:"+(idx*0.03)+"s\" onclick=\"openLog('"+it.id+"')\">"
      +'<div class="cat-dot '+cc+'"></div>'
      +'<div class="item-info">'
        +'<div class="item-name">'+esc(it.name)+'</div>'
        +(it.description?'<div class="item-desc">'+esc(it.description)+'</div>':"")
        +'<div class="item-meta">'
          +'<span class="item-tag">'+esc(it.category)+'</span>'
          +(it.location?'<span class="item-tag">📍 '+esc(it.location)+'</span>':"")
          +(proj?'<span class="item-tag">📋 '+esc(proj.slice(0,22))+'</span>':"")
          +(crit?'<span style="font-size:10px;color:var(--red);font-weight:700;">⚠ OUT OF STOCK</span>':low?'<span style="font-size:10px;color:var(--amber);font-weight:700;">⚠ LOW STOCK</span>':"")
        +'</div>'
      +'</div>'
      +'<div class="item-qty-block"><div class="item-qty" style="color:'+qc+'">'+it.qty+'</div><div class="item-qty-lbl">'+esc(it.unit||"each")+'</div></div>'
      +'<div class="item-actions">'
        +"<button class=\"ia-btn out\" onclick=\"openCO('"+it.id+"','out',event)\" title=\"Check Out\">−</button>"
        +"<button class=\"ia-btn inn\" onclick=\"openCO('"+it.id+"','in',event)\" title=\"Check In / Receive\">＋</button>"
        +editB
      +'</div>'
    +'</div>';
  }).join("");
}
function renderStats(){document.getElementById("s-total").textContent=items.length;document.getElementById("s-qty").textContent=items.reduce(function(s,i){return s+i.qty;},0);document.getElementById("s-low").textContent=items.filter(function(i){return i.threshold&&i.qty>0&&i.qty<=i.threshold;}).length;document.getElementById("s-out").textContent=items.filter(function(i){return i.qty===0;}).length;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
// ADD/EDIT
function openAdd(){if(role!=="admin")return;editId=null;document.getElementById("item-modal-title").textContent="＋ Add Tool / Equipment";["f-name","f-desc","f-loc","f-qty","f-threshold"].forEach(function(id){document.getElementById(id).value="";});document.getElementById("f-cat").value="Hand Tools";document.getElementById("f-unit").value="each";document.getElementById("f-project").value="";document.getElementById("item-modal").classList.add("show");setTimeout(function(){document.getElementById("f-name").focus();},50);}
function openEdit(id,e){if(e)e.stopPropagation();if(role!=="admin")return;var it=items.find(function(i){return i.id===id;});if(!it)return;editId=id;document.getElementById("item-modal-title").textContent="✏ Edit Item";document.getElementById("f-name").value=it.name||"";document.getElementById("f-desc").value=it.description||"";document.getElementById("f-cat").value=it.category||"Other";document.getElementById("f-loc").value=it.location||"";document.getElementById("f-qty").value=it.qty||0;document.getElementById("f-unit").value=it.unit||"each";document.getElementById("f-threshold").value=it.threshold||"";document.getElementById("f-project").value=it.projectId||"";document.getElementById("item-modal").classList.add("show");}
function saveItem(){var name=document.getElementById("f-name").value.trim();var qty=parseInt(document.getElementById("f-qty").value)||0;if(!name){alert("Item name is required.");return;}var rec={id:editId||"item-"+Date.now(),name:name,description:document.getElementById("f-desc").value.trim(),category:document.getElementById("f-cat").value,location:document.getElementById("f-loc").value.trim(),qty:qty,unit:document.getElementById("f-unit").value,threshold:parseInt(document.getElementById("f-threshold").value)||0,projectId:document.getElementById("f-project").value||"",log:editId?(items.find(function(i){return i.id===editId;})||{}).log||[]:[],createdAt:editId?(items.find(function(i){return i.id===editId;})||{}).createdAt||new Date().toISOString():new Date().toISOString()};rec.log.push({type:editId?"edit":"create",action:editId?"Item updated":"Item added to inventory",who:"Admin",qty:qty,date:new Date().toLocaleString()});var next=editId?items.map(function(i){return i.id===editId?rec:i;}):[...items,rec];saveItems(next);renderLocFilter();closeModal("item-modal");}
// CHECK IN/OUT
function openCO(id,mode,e){if(e)e.stopPropagation();var it=items.find(function(i){return i.id===id;});if(!it)return;coId=id;coMode=mode;document.getElementById("co-title").textContent=mode==="out"?"📤 Check Out":"📥 Check In / Receive";document.getElementById("co-item-name").textContent=it.name;document.getElementById("co-current").textContent=it.qty+" "+(it.unit||"each");document.getElementById("co-qty-lbl").textContent=mode==="out"?"Quantity to Check Out":"Quantity to Receive / Return";document.getElementById("co-qty").value="";document.getElementById("co-who").value="";document.getElementById("co-project").value=it.projectId||"";document.getElementById("co-note").value="";var sb=document.getElementById("co-save-btn");sb.style.background=mode==="out"?"var(--red)":"var(--green)";sb.textContent=mode==="out"?"Check Out":"Check In";document.getElementById("co-modal").classList.add("show");setTimeout(function(){document.getElementById("co-qty").focus();},50);}
function saveCO(){var qty=parseInt(document.getElementById("co-qty").value)||0;if(!qty||qty<1){alert("Enter a quantity.");return;}var who=document.getElementById("co-who").value.trim()||"Unknown";var note=document.getElementById("co-note").value.trim();var projId=document.getElementById("co-project").value;var proj=projId?(projects.find(function(p){return p.id===projId;})||{}).name||"":"";var it=items.find(function(i){return i.id===coId;});if(!it)return;if(coMode==="out"&&qty>it.qty){alert("Not enough stock. Available: "+it.qty);return;}var nq=coMode==="out"?it.qty-qty:it.qty+qty;var log={type:coMode,action:coMode==="out"?"Checked out "+qty+" "+(it.unit||"each"):"Received "+qty+" "+(it.unit||"each"),who:who,qty:coMode==="out"?-qty:qty,qtyAfter:nq,project:proj,note:note,date:new Date().toLocaleString()};var next=items.map(function(i){if(i.id!==coId)return i;return Object.assign({},i,{qty:nq,projectId:projId||i.projectId,log:[...(i.log||[]),log]});});saveItems(next);closeModal("co-modal");}
// LOG
function openLog(id){var it=items.find(function(i){return i.id===id;});if(!it)return;document.getElementById("log-name").textContent=it.name;var log=(it.log||[]).slice().reverse();var lc={create:"#10b981",edit:"#3b82f6",out:"#ef4444",in:"#10b981"};document.getElementById("log-list").innerHTML=log.length?log.map(function(l){var c=lc[l.type]||"#64748b";return'<div class="log-item"><div class="log-dot" style="background:'+c+'"></div><div style="flex:1;"><div style="font-size:12px;font-weight:600;color:var(--text);">'+esc(l.action)+(l.project?" → "+esc(l.project):"")+'</div><div style="font-size:10px;color:var(--muted);margin-top:2px;">'+esc(l.who)+" · "+esc(l.date)+(l.note?" · "+esc(l.note):"")+(l.qtyAfter!==undefined?" · Qty after: "+l.qtyAfter:"")+'</div></div></div>';}).join(""):'<div style="font-size:13px;color:var(--muted);padding:12px 0;">No activity yet.</div>';document.getElementById("log-modal").classList.add("show");}
function closeModal(id){document.getElementById(id).classList.remove("show");}
document.addEventListener("keydown",function(e){if(e.key==="Escape"){["item-modal","co-modal","log-modal"].forEach(function(id){closeModal(id);});}});
document.querySelectorAll(".modal-bg").forEach(function(bg){bg.addEventListener("click",function(e){if(e.target===bg)bg.classList.remove("show");});});


document.addEventListener("DOMContentLoaded", function(){ doLogin(); });
</script>
</body>
</html>
