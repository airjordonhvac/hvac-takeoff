  const [amount,setAmount]=useState("");
  const [desc,setDesc]=useState("");
  const [cat,setCat]=useState("Services");
  const [proj,setProj]=useState("");
  return <div style={{position:"fixed",inset:0,background:"#00000099",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
    <div style={{background:"#161b27",border:"1px solid #252d45",borderRadius:14,padding:24,width:"100%",maxWidth:440,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:14,fontWeight:800,color:"#fff",marginBottom:16}}>⚡ Quick Add PO</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div style={{gridColumn:"1/-1"}}><label style={labelStyle}>Vendor *</label><input value={vendor} onChange={e=>setVendor(e.target.value)} placeholder="Who are you buying from?" style={inputStyle}/></div>
        <div><label style={labelStyle}>Amount ($) *</label><input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00" style={inputStyle}/></div>
        <div><label style={labelStyle}>Category</label><select value={cat} onChange={e=>setCat(e.target.value)} style={selectStyle}>{catOptions.map(c=><option key={c}>{c}</option>)}</select></div>
        <div style={{gridColumn:"1/-1"}}><label style={labelStyle}>Project</label><select value={proj} onChange={e=>setProj(e.target.value)} style={selectStyle}><option value="">— Unassigned —</option>{projOptions}</select></div>
        <div style={{gridColumn:"1/-1"}}><label style={labelStyle}>Description</label><input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="What is this for?" style={inputStyle}/></div>
      </div>
      {amount&&<div style={{textAlign:"center",fontSize:20,fontWeight:800,color:"#2ecc87",padding:"10px 0",marginBottom:10,background:"#2ecc8710",borderRadius:8,fontFamily:"monospace"}}>{fmt(parseFloat(amount)||0)}</div>}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={{padding:"7px 16px",background:"transparent",border:"1px solid #252d45",borderRadius:8,color:"#6b7694",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
        <button onClick={()=>onSave(vendor,amount,desc,cat,proj,"")} style={{padding:"7px 18px",background:"#2ecc8722",border:"1px solid #2ecc8755",borderRadius:8,color:"#2ecc87",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>💾 Save PO</button>
      </div>
    </div>
  </div>;
}

function MarginTab({allProjectsForDisplay,allStatus,poList,projName,projSpent,popsDbSave}){
  const gmColor=pct=>pct===null?"#6b7694":pct>=25?"#2ecc87":pct>=15?"#f5a623":pct>=5?"#fb923c":"#ff5c5c";
  const fmtPct=pct=>pct===null?"—":`${pct.toFixed(1)}%`;
  const fmtK=v=>v>=1000000?`$${(v/1000000).toFixed(2)}M`:v>=1000?`$${Math.round(v/1000)}k`:`$${Math.round(v)}`;
  const [poOverrides,setPoOverrides]=useState(()=>lsGet("pops_margin_overrides",{})||{});

  function toggleOverride(id){
    const next={...poOverrides,[id]:!poOverrides[id]};
    setPoOverrides(next);
    popsDbSave("margin_overrides",next);
  }

  const getContractVal=id=>parseFloat(allStatus&&allStatus[id]?.contractValue)||0;
  const getTakeoffCost=id=>{
    const st=allStatus&&allStatus[id];
    if(!st?.costs)return 0;
    return Object.values(st.costs).reduce((s,v)=>s+(parseFloat(v)||0),0);
  };

  const allProjIds=[...new Set([
    ...allProjectsForDisplay.map(p=>p.id),
    ...poList.map(p=>p.projectId).filter(Boolean)
  ])];

  const projMargins=allProjIds.map(id=>{
    const proj=allProjectsForDisplay.find(p=>p.id===id)||{id,name:projName(id),source:"takeoff"};
    const rev=getContractVal(id);
    const usePO=!!poOverrides[id];
    const cost=usePO?projSpent(id):getTakeoffCost(id);
    const gm=rev-cost;
    const gmPct=rev>0?gm/rev*100:null;
    const pos=poList.filter(x=>x.projectId===id);
    const st=allStatus&&allStatus[id];
    const awardDate=st?.awardDate||st?.ntpDate||st?.bidDate||"";
    const year=awardDate&&!isNaN(new Date(awardDate).getFullYear())?
      new Date(awardDate).getFullYear():
      pos.length&&!isNaN(new Date(pos[0].date).getFullYear())?
      new Date(pos[0].date).getFullYear():null;
    return{...proj,cost,rev,gm,gmPct,poCount:pos.length,year,usePO,takeoffCost:getTakeoffCost(id)};
  }).filter(p=>p.rev>0||p.poCount>0||p.takeoffCost>0);

  const years={};
  projMargins.forEach(p=>{
    const y=p.year||"Unknown";
    if(!years[y])years[y]={year:y,rev:0,cost:0,gm:0,projCount:0};
    years[y].rev+=p.rev;years[y].cost+=p.cost;years[y].gm+=p.gm;years[y].projCount++;
  });
  const yearRows=Object.values(years).sort((a,b)=>String(b.year).localeCompare(String(a.year)));
  const totalRev=projMargins.reduce((s,p)=>s+p.rev,0);
  const totalCost=projMargins.reduce((s,p)=>s+p.cost,0);
  const totalGM=totalRev-totalCost;
  const totalGMPct=totalRev>0?totalGM/totalRev*100:null;
  const poCount=Object.values(poOverrides).filter(Boolean).length;

  const Toggle=({on,onToggle})=><div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}} onClick={onToggle}>
    <div style={{width:30,height:16,borderRadius:8,background:on?"#5b8dee":"#252d45",position:"relative",transition:"background 0.2s",flexShrink:0}}>
      <div style={{position:"absolute",top:2,left:on?14:2,width:12,height:12,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
    </div>
    <span style={{fontSize:10,color:on?"#5b8dee":"#2ecc87",fontWeight:700,whiteSpace:"nowrap"}}>{on?"PO Tracking":"Projects Tab"}</span>
  </div>;

  return <div>
    <div style={{padding:"10px 14px",background:"#1c2235",border:"1px solid #252d45",borderRadius:8,fontSize:11,color:"#6b7694",marginBottom:16,lineHeight:1.8}}>
      <span style={{color:"#dde3f0",fontWeight:700}}>Cost source per project: </span>
      <span style={{color:"#2ecc87",fontWeight:700}}>Projects Tab</span> — uses Cost Tracker from Takeoff{"  · "}
      <span style={{color:"#5b8dee",fontWeight:700}}>PO Tracking</span> — uses sum of Pops POs
      {poCount>0&&<span style={{color:"#5b8dee"}}>{` · ${poCount} project${poCount!==1?"s":""} using POs`}</span>}
    </div>

    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>
      {[{l:"TOTAL REVENUE",v:fmtK(totalRev),c:"#3d8ef8"},{l:"TOTAL COSTS",v:fmtK(totalCost),c:"#fb923c"},{l:"GROSS MARGIN $",v:fmtK(totalGM),c:gmColor(totalGMPct)},{l:"GROSS MARGIN %",v:fmtPct(totalGMPct),c:gmColor(totalGMPct)}].map(p=><Pill key={p.l} label={p.l} value={p.v} color={p.c}/>)}
    </div>

    {totalRev===0&&<div style={{padding:"12px 14px",background:"#f5a62310",border:"1px solid #f5a62333",borderRadius:8,fontSize:12,color:"#f5a623",marginBottom:16,lineHeight:1.7}}>
      ⚠ Set <strong>Contract Value $</strong> in each project's Contract tab in Takeoff to see margin data.
    </div>}

    {yearRows.length>0&&<div style={{marginBottom:24}}>
      <div style={{fontSize:11,fontWeight:700,color:"#5b8dee",letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #5b8dee33"}}>Yearly Breakdown</div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr>{["Year","Projects","Revenue","Costs","Gross Margin $","GM %"].map(h=><th key={h} style={{textAlign:h==="Year"||h==="Projects"?"left":"right",padding:"7px 12px",borderBottom:"1px solid #252d45",color:"#6b7694",fontSize:10,fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>
            {yearRows.map((y,i)=>{const pct=y.rev>0?y.gm/y.rev*100:null;return <tr key={y.year} style={{background:i%2===0?"transparent":"#252d4518"}}>
              <td style={{padding:"10px 12px",fontFamily:"monospace",fontSize:13,fontWeight:700,color:"#dde3f0"}}>{y.year}</td>
              <td style={{padding:"10px 12px",color:"#6b7694"}}>{y.projCount}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:"#3d8ef8",fontWeight:600}}>{fmtK(y.rev)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:"#fb923c",fontWeight:600}}>{fmtK(y.cost)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",fontWeight:700,color:gmColor(pct)}}>{fmtK(y.gm)}</td>
              <td style={{padding:"10px 12px",textAlign:"right"}}><span style={{fontSize:12,fontWeight:800,color:gmColor(pct),background:`${gmColor(pct)}18`,border:`1px solid ${gmColor(pct)}44`,borderRadius:4,padding:"2px 8px"}}>{fmtPct(pct)}</span></td>
            </tr>;})}
            <tr style={{borderTop:"2px solid #252d45"}}>
              <td style={{padding:"10px 12px",fontWeight:800,color:"#dde3f0",fontSize:13}}>All Years</td>
              <td style={{padding:"10px 12px",color:"#6b7694"}}>{projMargins.length}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:"#3d8ef8",fontWeight:800}}>{fmtK(totalRev)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",color:"#fb923c",fontWeight:800}}>{fmtK(totalCost)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontFamily:"monospace",fontWeight:800,color:gmColor(totalGMPct)}}>{fmtK(totalGM)}</td>
              <td style={{padding:"10px 12px",textAlign:"right"}}><span style={{fontSize:12,fontWeight:800,color:gmColor(totalGMPct),background:`${gmColor(totalGMPct)}18`,border:`1px solid ${gmColor(totalGMPct)}44`,borderRadius:4,padding:"2px 8px"}}>{fmtPct(totalGMPct)}</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>}

    <div style={{fontSize:11,fontWeight:700,color:"#5b8dee",letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #5b8dee33"}}>By Project — Toggle Cost Source</div>
    {projMargins.length===0&&<div style={{fontSize:13,color:"#6b7694",fontStyle:"italic",padding:"12px 0"}}>No project data yet. Set contract values in Takeoff to get started.</div>}
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {projMargins.sort((a,b)=>(b.year||0)-(a.year||0)).map(p=>{
        const barW=p.rev>0?Math.min(100,Math.round(p.cost/p.rev*100)):0;
        const over=p.cost>p.rev&&p.rev>0;
        return <div key={p.id} style={{background:"#161b27",border:`1px solid ${over?"#ff5c5c33":p.usePO?"#5b8dee33":"#252d45"}`,borderRadius:8,padding:"12px 16px"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:p.rev>0?8:4,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,color:"#dde3f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
              <div style={{fontSize:10,color:"#6b7694",marginTop:1,display:"flex",gap:8,flexWrap:"wrap"}}>
                <span>{p.poCount} PO{p.poCount!==1?"s":""}</span>
                {p.year&&<span>· {p.year}</span>}
                {p.usePO&&p.takeoffCost>0&&<span>· Projects Tab cost: {fmtK(p.takeoffCost)}</span>}
                {!p.usePO&&p.poCount>0&&<span>· PO total: {fmtK(projSpent(p.id))}</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:14,flexShrink:0,flexWrap:"wrap",alignItems:"flex-start"}}>
              <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#6b7694",fontWeight:700,letterSpacing:"0.4px",textTransform:"uppercase"}}>Revenue</div><div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:p.rev>0?"#3d8ef8":"#6b7694"}}>{p.rev>0?fmtK(p.rev):"—"}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#6b7694",fontWeight:700,letterSpacing:"0.4px",textTransform:"uppercase"}}>Costs</div><div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:"#fb923c"}}>{fmtK(p.cost)}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#6b7694",fontWeight:700,letterSpacing:"0.4px",textTransform:"uppercase"}}>GM $</div><div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:gmColor(p.gmPct)}}>{p.rev>0?fmtK(p.gm):"—"}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#6b7694",fontWeight:700,letterSpacing:"0.4px",textTransform:"uppercase"}}>GM %</div><div style={{fontSize:13,fontWeight:800,color:gmColor(p.gmPct)}}>{fmtPct(p.gmPct)}</div></div>
              <div style={{textAlign:"right",minWidth:100}}><div style={{fontSize:9,color:"#6b7694",fontWeight:700,letterSpacing:"0.4px",textTransform:"uppercase",marginBottom:4}}>Cost Source</div><Toggle on={p.usePO} onToggle={()=>toggleOverride(p.id)}/></div>
            </div>
          </div>
          {p.rev>0&&<div>
            <div style={{position:"relative",height:5,background:"#252d45",borderRadius:3,overflow:"hidden"}}>
              <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${barW}%`,background:over?"#ff5c5c":gmColor(p.gmPct),borderRadius:3,transition:"width 0.4s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#6b7694",marginTop:3}}>
              <span>{barW}% of revenue spent</span>
              {over&&<span style={{color:"#ff5c5c",fontWeight:700}}>⚠ Costs exceed contract value</span>}
            </div>
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

// ── POPS VIEW ────────────────────────────────────────────────────────────────
// Pops stores data in the same Supabase DB as Takeoff, using its own keys.
// On mount it auto-imports Takeoff projects so the project dropdown is pre-filled.

function PopsView({takeoffProjects,allManualProjects,allStatus}){
  const [popsReady,setPopsReady]=useState(false);
  const [poList,setPoList]=useState([]);
  const [popsProjects,setPopsProjects]=useState([]);
  const [poCounter,setPoCounter]=useState(1000);
  const [popsTab,setPopsTab]=useState("gen"); // gen | projects | all
  const [activeProjId,setActiveProjId]=useState(null);
  const [activePOId,setActivePOId]=useState(null);
  const [editingPO,setEditingPO]=useState(null);
  const [showNewProj,setShowNewProj]=useState(false);
  const [showManualPO,setShowManualPO]=useState(false);
  const [showQuickAdd,setShowQuickAdd]=useState(false);
  const [genInput,setGenInput]=useState("");
  const [genLoading,setGenLoading]=useState(false);
  const [genError,setGenError]=useState("");
  const [genProjSel,setGenProjSel]=useState("");
  const [apiKey,setApiKey]=useState("");
  const [showApiKey,setShowApiKey]=useState(false);
  const [popsSyncStatus,setPopsSyncStatus]=useState("syncing");
  const saveTimers=useRef({});

  // Build merged project list: Takeoff projects + manual + pops-only projects
  const AWARDED_STATUSES=["Awarded","In Progress"];
  const allTakeoffKeys=[...Object.keys(takeoffProjects||{}), ...Object.keys(allManualProjects||{})];
  const takeoffProjList=allTakeoffKeys
    .filter(k=>{
      const st=allStatus&&allStatus[k];
      return st&&AWARDED_STATUSES.includes(st.status);
    })
    .map(k=>{
      if(allManualProjects&&allManualProjects[k]) return {id:k,name:allManualProjects[k].name||k,source:"takeoff"};
      return {id:k,name:(takeoffProjects[k]?.projectInfo?.detectedProjectName||k.split("—")[0].trim()),source:"takeoff"};
    });
  // mergedProjects = active only (Awarded, In Progress, Bidding) — used in PO creation dropdowns
  const mergedProjects=[...takeoffProjList,...popsProjects.filter(p=>p.source==="pops")];
  // allProjectsForDisplay = everything including Complete — used in Projects tab view
  const allTakeoffForDisplay=Object.keys(takeoffProjects||{}).concat(Object.keys(allManualProjects||{})).map(k=>{
    const st=allStatus&&allStatus[k];
    const isComplete=st?.status==="Complete";
    if(allManualProjects&&allManualProjects[k]) return {id:k,name:allManualProjects[k].name||k,source:"takeoff",complete:isComplete};
    return {id:k,name:(takeoffProjects[k]?.projectInfo?.detectedProjectName||k.split("—")[0].trim()),source:"takeoff",complete:isComplete};
  });
  const allProjectsForDisplay=[...allTakeoffForDisplay,...popsProjects.filter(p=>p.source==="pops")];

  const fmt=n=>"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  // projName needs to search allProjectsForDisplay so completed project names still show on existing POs
  const projName=id=>{const p=allProjectsForDisplay.find(x=>x.id===id);return p?p.name:"—";};
  const projSpent=id=>poList.filter(p=>p.projectId===id).reduce((s,p)=>s+p.total,0);
  const nowStr=()=>new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});

  function statusBadge(s){
    if(s==="approved") return <span style={{fontSize:9,fontWeight:800,color:"#2ecc87",background:"#2ecc8718",border:"1px solid #2ecc8744",borderRadius:4,padding:"2px 7px",letterSpacing:"0.3px"}}>✓ APPROVED</span>;
    if(s==="rejected") return <span style={{fontSize:9,fontWeight:800,color:"#ff5c5c",background:"#ff5c5c18",border:"1px solid #ff5c5c44",borderRadius:4,padding:"2px 7px"}}>✕ REJECTED</span>;
    return <span style={{fontSize:9,fontWeight:800,color:"#f5a623",background:"#f5a62318",border:"1px solid #f5a62344",borderRadius:4,padding:"2px 7px"}}>⏳ PENDING</span>;
  }

  // Load from Supabase on mount
  const bootDone=useRef(false);
  useEffect(()=>{
    if(bootDone.current)return;
    bootDone.current=true;
    (async()=>{
      try{
        const [pos,projs,ctr,key]=await Promise.all([
          sbGet("pops_pos",[]),
          sbGet("pops_projects",[]),
          sbGet("pops_counter",1000),
          sbGet("pops_apikey",""),
        ]);
        if(pos&&pos.length) setPoList(pos);
        if(projs&&projs.length) setPopsProjects(projs);
        if(ctr) setPoCounter(ctr);
        if(key) setApiKey(key);
        setPopsSyncStatus("synced");
      }catch(e){
        setPopsSyncStatus("offline");
      }
      setPopsReady(true);
    })();
  },[]);

  function popsDbSave(key,value){
    lsSet("pops_"+key,value);
    clearTimeout(saveTimers.current[key]);
    saveTimers.current[key]=setTimeout(()=>sbSet("pops_"+key,value),1500);
  }

  function savePOs(next){setPoList(next);popsDbSave("pos",next);}
  function saveProjs(next){setPopsProjects(next);popsDbSave("projects",next);}
  function saveCtr(next){setPoCounter(next);popsDbSave("counter",next);}

  // ── Generate PO with AI ──
  async function generatePO(){
    if(!genInput.trim())return;
    if(!apiKey){setShowApiKey(true);return;}
    setGenLoading(true);setGenError("");
    const today=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
    const projListStr=mergedProjects.map(p=>`ID:${p.id} NAME:"${p.name}"`).join(", ")||"none";
    const prompt=`You are a procurement AI. Parse this purchase request and return ONLY a valid JSON object — no markdown, no backticks, no explanation.\n\nRequest: "${genInput}"\nToday: ${today}\nAvailable projects: ${projListStr}\nManually selected project ID: "${genProjSel||"none"}"\n\nReturn exactly this JSON:\n{"vendor":"string","category":"Hardware|Software|Services|Facilities|Materials|Other","department":"string","lineItems":[{"description":"string","qty":1,"unitPrice":0}],"tax":0,"notes":"string","deliveryDate":"string","inferredProjectId":"string"}`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
      });
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const text=(data.content||[]).map(c=>c.text||"").join("");
      const match=text.match(/\{[\s\S]*\}/);
      if(!match)throw new Error("No JSON in response");
      const po=JSON.parse(match[0]);
      const total=po.lineItems.reduce((s,li)=>s+li.qty*li.unitPrice,0)+(po.tax||0);
      const newCtr=poCounter+1;
      const record={
        id:String(Date.now()),num:String(newCtr),vendor:po.vendor,category:po.category,
        department:po.department,lineItems:po.lineItems,tax:po.tax||0,notes:po.notes||"",
        date:new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"}),
        deliveryDate:po.deliveryDate,status:"pending",total,
        projectId:genProjSel||po.inferredProjectId||"",
        history:[{type:"create",action:"PO Generated by AI",detail:`Total: ${fmt(total)}`,time:nowStr()}]
      };
      const next=[...poList,record];
      savePOs(next);saveCtr(newCtr);
      setActivePOId(record.id);setGenInput("");setPopsTab("gen");
    }catch(e){setGenError(e.message);}
    setGenLoading(false);
  }

  // ── Save manual PO ──
  function saveManualPO(vendor,amount,desc,cat,projId,notes,delivery){
    if(!vendor||!amount)return;
    const newCtr=poCounter+1;
    const record={
      id:String(Date.now()),num:String(newCtr),vendor,category:cat,department:"Operations",
      lineItems:[{description:desc||vendor+" purchase",qty:1,unitPrice:parseFloat(amount)||0}],
      tax:0,notes:notes||"",
      date:new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"}),
      deliveryDate:delivery||"TBD",status:"pending",
      total:parseFloat(amount)||0,projectId:projId||"",
      history:[{type:"create",action:"PO Created Manually",detail:`Total: ${fmt(parseFloat(amount)||0)}`,time:nowStr()}]
    };
    const next=[...poList,record];
    savePOs(next);saveCtr(newCtr);
    setActivePOId(record.id);setShowManualPO(false);setShowQuickAdd(false);
  }

  function updatePOStatus(id,newStatus){
    const next=poList.map(p=>{
      if(p.id!==id)return p;
      return {...p,status:newStatus,history:[...p.history,{type:"status",action:`Status → ${newStatus}`,detail:"",time:nowStr()}]};
    });
    savePOs(next);
  }

  function deletePO(id){
    if(!window.confirm("Delete this PO?"))return;
    savePOs(poList.filter(p=>p.id!==id));
    setActivePOId(null);
  }

  const activePO=poList.find(p=>p.id===activePOId)||null;

  // ── Render PO Detail ──
  function PODetail({po}){
    const proj=mergedProjects.find(p=>p.id===po.projectId);
    const sub=po.lineItems.reduce((s,li)=>s+li.qty*li.unitPrice,0);
    return <div>
      <button onClick={()=>setActivePOId(null)} style={{background:"transparent",border:"none",color:"#6b7694",cursor:"pointer",fontSize:12,fontFamily:"inherit",marginBottom:12,padding:0,display:"flex",alignItems:"center",gap:4}}>← Back</button>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        {statusBadge(po.status)}
        {proj&&<span style={{fontSize:10,color:"#c084fc",background:"#c084fc18",border:"1px solid #c084fc44",borderRadius:4,padding:"2px 7px",fontWeight:700}}>📁 {proj.name}</span>}
        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          <button onClick={()=>updatePOStatus(po.id,"approved")} style={{padding:"4px 10px",background:"#2ecc8718",border:"1px solid #2ecc8744",borderRadius:5,color:"#2ecc87",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓ Approve</button>
          <button onClick={()=>updatePOStatus(po.id,"rejected")} style={{padding:"4px 10px",background:"#ff5c5c18",border:"1px solid #ff5c5c44",borderRadius:5,color:"#ff5c5c",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✕ Reject</button>
          <button onClick={()=>deletePO(po.id)} style={{padding:"4px 10px",background:"transparent",border:"1px solid #252d45",borderRadius:5,color:"#6b7694",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>🗑</button>
        </div>
      </div>
      <div style={{background:"#161b27",border:"1px solid #252d45",borderRadius:10,padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",borderBottom:"1px solid #252d45",paddingBottom:16,marginBottom:16}}>
          <div><div style={{fontSize:15,fontWeight:700,color:"#fff"}}>Air Jordon HVAC LLC</div><div style={{fontSize:11,color:"#6b7694"}}>Purchase Order</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px"}}>PO NUMBER</div><div style={{fontSize:20,fontWeight:800,color:"#3d8ef8",fontFamily:"monospace"}}>PO-{po.num}</div></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          {[["Vendor",po.vendor],["Date",po.date],["Project",proj?proj.name:"— Unassigned"],["Delivery",po.deliveryDate],["Department",po.department],["Category",po.category]].map(([l,v])=>
            <div key={l}><div style={{fontSize:9,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:2}}>{l}</div><div style={{fontSize:13,fontWeight:500,color:"#dde3f0"}}>{v}</div></div>
          )}
        </div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:14}}>
          <thead><tr>{["Description","Qty","Unit Price","Total"].map(h=><th key={h} style={{textAlign:h==="Description"?"left":"right",padding:"6px 8px",borderBottom:"1px solid #252d45",color:"#6b7694",fontSize:10,fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
          <tbody>{po.lineItems.map((li,i)=><tr key={i} style={{borderBottom:"1px solid #252d4522"}}>
            <td style={{padding:"8px 8px",color:"#dde3f0"}}>{li.description}</td>
            <td style={{padding:"8px 8px",textAlign:"right",color:"#6b7694",fontFamily:"monospace"}}>{li.qty}</td>
            <td style={{padding:"8px 8px",textAlign:"right",color:"#6b7694",fontFamily:"monospace"}}>{fmt(li.unitPrice)}</td>
            <td style={{padding:"8px 8px",textAlign:"right",color:"#dde3f0",fontFamily:"monospace",fontWeight:600}}>{fmt(li.qty*li.unitPrice)}</td>
          </tr>)}</tbody>
        </table>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
          <div style={{width:200}}>
            {po.tax>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12,color:"#6b7694"}}><span>Tax</span><span style={{fontFamily:"monospace"}}>{fmt(po.tax)}</span></div>}
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderTop:"1px solid #252d45",fontSize:15,fontWeight:800,color:"#2ecc87"}}><span>Total</span><span style={{fontFamily:"monospace"}}>{fmt(po.total)}</span></div>
          </div>
        </div>
        {po.notes&&<div style={{background:"#3d8ef808",border:"1px solid #3d8ef833",borderRadius:6,padding:"10px 12px",fontSize:12,color:"#dde3f0",lineHeight:1.6,marginBottom:12}}>📝 {po.notes}</div>}
        <div style={{borderTop:"1px solid #252d45",paddingTop:12,marginTop:4}}>
          <div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:8}}>Change History</div>
          {po.history.slice().reverse().map((h,i)=><div key={i} style={{display:"flex",gap:10,paddingBottom:8,fontSize:11}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:h.type==="create"?"#2ecc87":h.type==="status"?"#f5a623":"#c084fc",flexShrink:0,marginTop:3}}/>
            <div><div style={{color:"#dde3f0",fontWeight:600}}>{h.action}</div>{h.detail&&<div style={{color:"#6b7694",marginTop:1}}>{h.detail}</div>}<div style={{color:"#6b7694",fontSize:10,marginTop:1,fontFamily:"monospace"}}>{h.time}</div></div>
          </div>)}
        </div>
      </div>
    </div>;
  }

  // ── Quick Add Form ──
  const [qaVendor,setQaVendor]=useState("");
  const [qaAmount,setQaAmount]=useState("");
  const [qaDesc,setQaDesc]=useState("");
  const [qaCat,setQaCat]=useState("Services");
  const [qaProj,setQaProj]=useState("");

  // ── Manual PO Form ──
  const [mpVendor,setMpVendor]=useState("");
  const [mpAmount,setMpAmount]=useState("");
  const [mpDesc,setMpDesc]=useState("");
  const [mpCat,setMpCat]=useState("Services");
  const [mpProj,setMpProj]=useState("");
  const [mpNotes,setMpNotes]=useState("");
  const [mpDelivery,setMpDelivery]=useState("");

  // ── New Project Form ──
  const [npName,setNpName]=useState("");
  const [npOwner,setNpOwner]=useState("");
  const [npBudget,setNpBudget]=useState("");

  function createProject(){
    if(!npName.trim())return;
    const p={id:"pops-"+Date.now(),name:npName.trim(),owner:npOwner.trim()||"Air Jordon HVAC",budget:parseFloat(npBudget)||0,source:"pops"};
    const next=[...popsProjects,p];
    saveProjs(next);setNpName("");setNpOwner("");setNpBudget("");setShowNewProj(false);
  }

  const inputStyle={width:"100%",background:"#252d45",border:"1px solid #252d45",borderRadius:6,padding:"7px 10px",color:"#dde3f0",fontSize:13,fontFamily:"inherit",outline:"none"};
  const selectStyle={...inputStyle,cursor:"pointer"};
  const labelStyle={fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:4,display:"block"};
  const catOptions=["Services","Hardware","Software","Facilities","Materials","Other"];

  const totalCommitted=poList.reduce((s,p)=>s+p.total,0);
  const pendingCount=poList.filter(p=>p.status==="pending").length;
  const approvedTotal=poList.filter(p=>p.status==="approved").reduce((s,p)=>s+p.total,0);

  const Modal=({show,onClose,title,children,wide})=>show?<div style={{position:"fixed",inset:0,background:"#00000099",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
    <div style={{background:"#161b27",border:"1px solid #252d45",borderRadius:14,padding:24,width:"100%",maxWidth:wide?580:440,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:14,fontWeight:800,color:"#fff",marginBottom:16}}>{title}</div>
      {children}
    </div>
  </div>:null;

  const projOptions=<>{mergedProjects.map(p=><option key={p.id} value={p.id}>{p.name}{p.source==="takeoff"?" ↗":""}</option>)}</>;

  if(!popsReady) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",gap:12,color:"#6b7694",fontSize:13}}>
    <div style={{width:24,height:24,border:"2px solid #252d45",borderTop:"2px solid #3d8ef8",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    Loading Pops…
  </div>;

  return <div style={{maxWidth:1040,margin:"0 auto",padding:"20px 18px"}}>

    {/* ── API Key Modal ── */}
    <Modal show={showApiKey} onClose={()=>setShowApiKey(false)} title="🔑 Anthropic API Key">
      <div style={{fontSize:12,color:"#6b7694",marginBottom:14,lineHeight:1.7}}>Needed for AI-generated POs. Stays in memory only — sent directly to api.anthropic.com.</div>
      <div style={{marginBottom:14}}><label style={labelStyle}>API Key</label>
        <input type="password" defaultValue={apiKey} id="pops-apikey-input" placeholder="sk-ant-api03-…" style={inputStyle}/></div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>setShowApiKey(false)} style={{padding:"7px 16px",background:"transparent",border:"1px solid #252d45",borderRadius:8,color:"#6b7694",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
        <button onClick={()=>{const k=document.getElementById("pops-apikey-input").value.trim();setApiKey(k);popsDbSave("apikey",k);setShowApiKey(false);}} style={{padding:"7px 18px",background:"#3d8ef822",border:"1px solid #3d8ef855",borderRadius:8,color:"#3d8ef8",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Save Key</button>
      </div>
    </Modal>

    {/* ── New Project Modal ── */}
    <Modal show={showNewProj} onClose={()=>setShowNewProj(false)} title="📁 New Project">
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
        <div><label style={labelStyle}>Project Name *</label><input value={npName} onChange={e=>setNpName(e.target.value)} placeholder="e.g. Crunch Fitness Denton" style={inputStyle}/></div>
        <div><label style={labelStyle}>Owner</label><input value={npOwner} onChange={e=>setNpOwner(e.target.value)} placeholder="e.g. Air Jordon HVAC" style={inputStyle}/></div>
        <div><label style={labelStyle}>Budget ($) — optional</label><input type="number" value={npBudget} onChange={e=>setNpBudget(e.target.value)} placeholder="e.g. 50000" style={inputStyle}/></div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>setShowNewProj(false)} style={{padding:"7px 16px",background:"transparent",border:"1px solid #252d45",borderRadius:8,color:"#6b7694",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
        <button onClick={createProject} style={{padding:"7px 18px",background:"#2ecc8722",border:"1px solid #2ecc8755",borderRadius:8,color:"#2ecc87",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Create Project</button>
      </div>
    </Modal>

    {/* ── Quick Add Modal ── */}
    {showManualPO&&<ManualPOModal
      onClose={()=>setShowManualPO(false)}
      onSave={saveManualPO}
      projOptions={projOptions}
      catOptions={catOptions}
      inputStyle={inputStyle}
      labelStyle={labelStyle}
      selectStyle={selectStyle}
    />}

    {showQuickAdd&&<QuickAddModal
      onClose={()=>setShowQuickAdd(false)}
      onSave={saveManualPO}
      projOptions={projOptions}
      catOptions={catOptions}
      inputStyle={inputStyle}
      labelStyle={labelStyle}
      selectStyle={selectStyle}
      fmt={fmt}
    />}

    {/* ── Header pills + actions ── */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        {[{l:"TOTAL POs",v:poList.length,c:"#3d8ef8"},{l:"COMMITTED",v:"$"+Math.round(totalCommitted/1000)+"k",c:"#2ecc87"},{l:"APPROVED",v:"$"+Math.round(approvedTotal/1000)+"k",c:"#2ecc87"},{l:"PENDING",v:pendingCount,c:pendingCount>0?"#f5a623":"#6b7694"}].map(p=>
          <Pill key={p.l} label={p.l} value={p.v} color={p.c}/>
        )}
        <div style={{display:"flex",alignItems:"center",gap:5,padding:"10px 14px",background:"#252d4533",border:"1px solid #252d45",borderRadius:10,minWidth:86}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:popsSyncStatus==="synced"?"#2ecc87":popsSyncStatus==="syncing"?"#f5a623":"#ff5c5c"}}/>
          <span style={{fontSize:10,fontWeight:700,color:popsSyncStatus==="synced"?"#2ecc87":popsSyncStatus==="syncing"?"#f5a623":"#ff5c5c"}}>{popsSyncStatus==="synced"?"Synced":popsSyncStatus==="syncing"?"Syncing…":"Offline"}</span>
        </div>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={()=>setShowApiKey(true)} style={{padding:"6px 12px",background:apiKey?"#2ecc8718":"#f5a62318",border:`1px solid ${apiKey?"#2ecc8744":"#f5a62344"}`,borderRadius:7,color:apiKey?"#2ecc87":"#f5a623",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{apiKey?"🔑 Key ✓":"🔑 API Key"}</button>
        <button onClick={()=>setShowNewProj(true)} style={{padding:"6px 12px",background:"#2ecc8718",border:"1px solid #2ecc8744",borderRadius:7,color:"#2ecc87",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Project</button>
        <button onClick={()=>setShowManualPO(true)} style={{padding:"6px 12px",background:"#3d8ef818",border:"1px solid #3d8ef844",borderRadius:7,color:"#3d8ef8",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>📝 Manual PO</button>
        <button onClick={()=>setShowQuickAdd(true)} style={{padding:"6px 12px",background:"#c084fc18",border:"1px solid #c084fc44",borderRadius:7,color:"#c084fc",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>⚡ Quick Add</button>
      </div>
    </div>

    {/* ── Sub-tabs ── */}
    <div style={{display:"flex",gap:2,borderBottom:"1px solid #252d45",marginBottom:16}}>
      {[{k:"gen",l:"⚡ Generate"},{k:"projects",l:"📁 Projects"},{k:"all",l:"📋 All POs"},{k:"margin",l:"📊 Margin"}].map(t=>
        <button key={t.k} onClick={()=>{setPopsTab(t.k);setActivePOId(null);setActiveProjId(null);}} style={{padding:"7px 14px",background:"transparent",border:"none",borderBottom:popsTab===t.k?"2px solid #5b8dee":"2px solid transparent",color:popsTab===t.k?"#5b8dee":"#6b7694",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{t.l}</button>
      )}
    </div>

    {/* ── PO Detail overlay ── */}
    {activePO&&<PODetail po={activePO}/>}

    {/* ── Generate tab ── */}
    {!activePO&&popsTab==="gen"&&<div>
      <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:4}}>Generate Purchase Order</div>
      <div style={{fontSize:12,color:"#6b7694",marginBottom:16}}>Use AI to generate a PO from plain English, or create one manually.</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 200px",gap:12,marginBottom:12}}>
        <textarea value={genInput} onChange={e=>setGenInput(e.target.value)} placeholder={'e.g. "50 Trane RTUs at $1,800/ton for Total Wine Tulsa"\nor "JMIL sheet metal fab for Crunch Fitness $37,813"'}
          style={{background:"#1c2235",border:"1px solid #252d45",borderRadius:8,color:"#dde3f0",fontSize:13,padding:12,resize:"none",height:100,fontFamily:"inherit",outline:"none"}}/>
        <div>
          <label style={labelStyle}>Assign to Project</label>
          <select value={genProjSel} onChange={e=>setGenProjSel(e.target.value)} style={{...selectStyle,marginBottom:8}}><option value="">Auto-detect</option>{projOptions}</select>
          <div style={{fontSize:10,color:"#6b7694",lineHeight:1.6}}>Projects marked ↗ are from your Takeoff app</div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}>
        <button onClick={generatePO} disabled={genLoading||!genInput.trim()} style={{padding:"9px 20px",background:genLoading?"#252d45":"#5b8dee",border:"none",borderRadius:7,color:"#fff",fontSize:12,fontWeight:700,cursor:genLoading?"not-allowed":"pointer",fontFamily:"inherit",letterSpacing:"0.05em"}}>{genLoading?"Generating…":"⚡ AI Generate PO"}</button>
        <button onClick={()=>setShowManualPO(true)} style={{padding:"9px 18px",background:"#252d45",border:"1px solid #252d45",borderRadius:7,color:"#dde3f0",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>📝 Manual</button>
      </div>
      {genError&&<div style={{padding:"10px 14px",background:"#ff5c5c10",border:"1px solid #ff5c5c33",borderRadius:7,fontSize:12,color:"#ff5c5c",marginBottom:12}}>{genError}</div>}
      {/* Recent POs */}
      {poList.length>0&&<><div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:8}}>Recent POs</div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {poList.slice().reverse().slice(0,8).map(p=><div key={p.id} onClick={()=>setActivePOId(p.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#161b27",border:"1px solid #252d45",borderRadius:8,cursor:"pointer"}}>
          <span style={{fontFamily:"monospace",fontSize:10,color:"#5b8dee",minWidth:52}}>PO-{p.num}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:"#dde3f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.vendor}</div>
            <div style={{fontSize:10,color:"#6b7694"}}>{p.category} · {projName(p.projectId)}</div>
          </div>
          {statusBadge(p.status)}
          <span style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:"#2ecc87",flexShrink:0}}>${Math.round(p.total/1000)}k</span>
        </div>)}
      </div></>}
    </div>}

    {/* ── Projects tab ── */}
    {!activePO&&popsTab==="projects"&&<div>
      <div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:10}}>
        Active Projects — Awarded &amp; In Progress
      </div>
      {mergedProjects.length===0&&<div style={{fontSize:13,color:"#6b7694",fontStyle:"italic",padding:"20px 0"}}>No active projects. Projects set to Awarded or In Progress will appear here automatically.</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
        {mergedProjects.map(p=>{
          const spent=projSpent(p.id);
          const pos=poList.filter(x=>x.projectId===p.id);
          const rev=parseFloat(allStatus&&allStatus[p.id]?.contractValue)||0;
          const gm=rev-spent;
          const gmPct=rev>0?gm/rev*100:null;
          const gmC=gmPct===null?"#6b7694":gmPct>=25?"#2ecc87":gmPct>=15?"#f5a623":gmPct>=5?"#fb923c":"#ff5c5c";
          return <div key={p.id} onClick={()=>{setActiveProjId(p.id);setPopsTab("all");}} style={{background:"#161b27",border:"1px solid #252d45",borderRadius:10,padding:"14px 16px",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{fontSize:13,fontWeight:700,color:"#dde3f0",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginRight:8}}>{p.name}</div>
              <span style={{fontSize:9,color:p.source==="takeoff"?"#5b8dee":"#c084fc",background:p.source==="takeoff"?"#5b8dee18":"#c084fc18",border:`1px solid ${p.source==="takeoff"?"#5b8dee44":"#c084fc44"}`,borderRadius:3,padding:"1px 5px",fontWeight:700,flexShrink:0}}>{pos.length} POs</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
              <div>
                <div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:"#fb923c"}}>{`$${Math.round(spent/1000)}k`} costs</div>
                {rev>0&&<div style={{fontFamily:"monospace",fontSize:11,color:"#3d8ef8",marginTop:1}}>{`$${Math.round(rev/1000)}k`} revenue</div>}
              </div>
              {rev>0&&<div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:"#6b7694",fontWeight:700,letterSpacing:"0.3px",textTransform:"uppercase"}}>GM</div>
                <div style={{fontSize:13,fontWeight:800,color:gmC}}>{gmPct!==null?`${gmPct.toFixed(1)}%`:"—"}</div>
              </div>}
            </div>
            {p.source==="takeoff"&&<div style={{fontSize:9,color:"#5b8dee",marginTop:4}}>↗ from Takeoff</div>}
          </div>;
        })}
      </div>
    </div>}

    {/* ── All POs tab ── */}
    {!activePO&&popsTab==="all"&&<div>
      {activeProjId&&<button onClick={()=>setActiveProjId(null)} style={{background:"transparent",border:"none",color:"#6b7694",cursor:"pointer",fontSize:12,fontFamily:"inherit",marginBottom:10,padding:0}}>← All Projects</button>}
      <div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:10}}>
        {activeProjId?`POs for ${projName(activeProjId)}`:`All POs (${poList.length})`}
      </div>
      {(activeProjId?poList.filter(p=>p.projectId===activeProjId):poList).length===0&&<div style={{fontSize:13,color:"#6b7694",fontStyle:"italic",padding:"20px 0"}}>No POs yet.</div>}
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {(activeProjId?poList.filter(p=>p.projectId===activeProjId):poList).slice().reverse().map(p=>
          <div key={p.id} onClick={()=>setActivePOId(p.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#161b27",border:"1px solid #252d45",borderRadius:8,cursor:"pointer"}}>
            <span style={{fontFamily:"monospace",fontSize:10,color:"#5b8dee",minWidth:52}}>PO-{p.num}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:"#dde3f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.vendor}</div>
              <div style={{fontSize:10,color:"#6b7694"}}>{p.category} · <span style={{color:"#c084fc"}}>{projName(p.projectId)}</span> · {p.date}</div>
            </div>
            {statusBadge(p.status)}
            <span style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:"#2ecc87",flexShrink:0}}>{fmt(p.total)}</span>
          </div>
        )}
      </div>
    </div>}

    {/* ── Margin tab ── */}
    {!activePO&&popsTab==="margin"&&<MarginTab allProjectsForDisplay={allProjectsForDisplay} allStatus={allStatus} poList={poList} projName={projName} projSpent={projSpent} popsDbSave={popsDbSave}/>}
  </div>;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
