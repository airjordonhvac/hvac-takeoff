  {key:"monthly",    label:"Monthly",       months:1},
  {key:"quarterly",  label:"Quarterly",     months:3},
  {key:"biannual",   label:"Semi-Annual",   months:6},
  {key:"annual",     label:"Annual",        months:12},
  {key:"custom",     label:"Custom",        months:null},
];
const TICKET_STATUS=["Open","Scheduled","In Progress","Completed","Invoiced","Closed"];
const TICKET_TYPES=["PM Service","Repair","Diagnostic","Emergency","Warranty","Inspection","Other"];
const PRIORITY=["Low","Normal","High","Emergency"];
const PRIORITY_COLORS={Low:"#6b7694",Normal:"#3d8ef8",High:"#fb923c",Emergency:"#ff5c5c"};

function nextVisitDate(lastDate, months){
  if(!lastDate||!months)return null;
  const d=new Date(lastDate);
  d.setMonth(d.getMonth()+months);
  return d;
}

function ServiceView({pmAgreements,savePmAgreements,serviceTickets,saveServiceTickets}){
  const [tab,setTab]=useState("schedule"); // "schedule" | "agreements" | "tickets"
  const [showPMForm,setShowPMForm]=useState(false);
  const [showTicketForm,setShowTicketForm]=useState(false);
  const [editPM,setEditPM]=useState(null);
  const [editTicket,setEditTicket]=useState(null);
  // Refs store text field values — no re-render while typing
  const pmData=useRef({name:"",customer:"",address:"",contact:"",phone:"",email:"",equipment:"",frequency:"quarterly",customMonths:"",lastService:"",contractValue:"",nextValue:"",notes:"",active:true});
  const ticketData=useRef({pmId:"",customer:"",address:"",type:"PM Service",priority:"Normal",scheduledDate:"",completedDate:"",tech:"",equipment:"",laborHours:"",materialCost:"",invoiceAmount:"",invoiceDate:"",status:"Open",notes:""});
  // Only selects/toggles stay in state (needed for conditional rendering)
  const [pmSelects,setPmSelects]=useState({frequency:"quarterly",active:true});
  const [ticketSelects,setTicketSelects]=useState({pmId:"",type:"PM Service",priority:"Normal",status:"Open"});
  const getPmForm=()=>({...pmData.current,...pmSelects});
  const getTicketForm=()=>({...ticketData.current,...ticketSelects});

  // Compute next visits for all active PMs
  const pmWithNext=pmAgreements.map(pm=>{
    const freq=PM_FREQUENCIES.find(f=>f.key===pm.frequency);
    const months=pm.frequency==="custom"?parseInt(pm.customMonths)||0:freq?.months||0;
    const next=nextVisitDate(pm.lastService,months);
    const daysUntil=next?daysBetween(today,next):null;
    const overdue=daysUntil!==null&&daysUntil<0;
    const dueSoon=daysUntil!==null&&daysUntil>=0&&daysUntil<=30;
    return{...pm,next,daysUntil,overdue,dueSoon,months};
  });

  // Schedule: all upcoming visits sorted by date, next 12 months
  const upcoming=pmWithNext
    .filter(pm=>pm.active&&pm.next)
    .sort((a,b)=>a.next-b.next);

  // Upcoming tickets with scheduled dates
  const scheduledTickets=serviceTickets
    .filter(t=>t.scheduledDate&&!["Completed","Closed","Invoiced"].includes(t.status))
    .sort((a,b)=>new Date(a.scheduledDate)-new Date(b.scheduledDate));

  const openPM=(pm)=>{pmData.current={...pm};setPmSelects({frequency:pm.frequency||"quarterly",active:pm.active!==false});setEditPM(pm.id);setShowPMForm(true);};
  const openTicket=(t)=>{ticketData.current={...t};setTicketSelects({pmId:String(t.pmId||""),type:t.type||"PM Service",priority:t.priority||"Normal",status:t.status||"Open"});setEditTicket(t.id);setShowTicketForm(true);};

  const savePM=()=>{
    const pf=getPmForm();
    if(!pf.name)return;
    if(editPM){
      savePmAgreements(pmAgreements.map(p=>p.id===editPM?{...pf,id:editPM}:p));
    }else{
      savePmAgreements([...pmAgreements,{...pf,id:Date.now()}]);
    }
    setShowPMForm(false);setEditPM(null);
    pmData.current={name:"",customer:"",address:"",contact:"",phone:"",email:"",equipment:"",frequency:"quarterly",customMonths:"",lastService:"",contractValue:"",nextValue:"",notes:"",active:true};
    setPmSelects({frequency:"quarterly",active:true});
  };

  const saveTicket=()=>{
    const tf=getTicketForm();
    if(!tf.customer&&!tf.pmId)return;
    if(editTicket){
      saveServiceTickets(serviceTickets.map(t=>t.id===editTicket?{...tf,id:editTicket}:t));
    }else{
      saveServiceTickets([...serviceTickets,{...tf,id:Date.now()}]);
    }
    setShowTicketForm(false);setEditTicket(null);
    ticketData.current={pmId:"",customer:"",address:"",type:"PM Service",priority:"Normal",scheduledDate:"",completedDate:"",tech:"",equipment:"",laborHours:"",materialCost:"",invoiceAmount:"",invoiceDate:"",status:"Open",notes:""};
    setTicketSelects({pmId:"",type:"PM Service",priority:"Normal",status:"Open"});
  };

  const deletePM=(id)=>{if(window.confirm("Delete this PM agreement?"))savePmAgreements(pmAgreements.filter(p=>p.id!==id));};
  const deleteTicket=(id)=>{if(window.confirm("Delete this ticket?"))saveServiceTickets(serviceTickets.filter(t=>t.id!==id));};
  const logVisit=(pm)=>{
    const today_str=new Date().toISOString().split("T")[0];
    savePmAgreements(pmAgreements.map(p=>p.id===pm.id?{...p,lastService:today_str}:p));
    // Auto-create a completed ticket
    saveServiceTickets([...serviceTickets,{id:Date.now(),pmId:pm.id,customer:pm.customer,address:pm.address,type:"PM Service",priority:"Normal",scheduledDate:today_str,completedDate:today_str,tech:"",equipment:pm.equipment,laborHours:"",materialCost:"",invoiceAmount:pm.nextValue||"",invoiceDate:"",status:"Completed",notes:`Auto-logged from PM: ${pm.name}`}]);
  };

  // Summary stats
  const totalActive=pmAgreements.filter(p=>p.active).length;
  const overdueCount=pmWithNext.filter(p=>p.active&&p.overdue).length;
  const dueSoonCount=pmWithNext.filter(p=>p.active&&p.dueSoon).length;
  const totalAnnualPMValue=pmAgreements.filter(p=>p.active).reduce((s,p)=>{
    const freq=PM_FREQUENCIES.find(f=>f.key===p.frequency);
    const months=p.frequency==="custom"?parseInt(p.customMonths)||0:freq?.months||0;
    const visitsPerYear=months>0?12/months:0;
    return s+(parseFloat(p.nextValue)||0)*visitsPerYear;
  },0);
  const openTickets=serviceTickets.filter(t=>!["Completed","Closed","Invoiced"].includes(t.status)).length;
  const mtdRevenue=serviceTickets.filter(t=>{
    if(!t.invoiceDate)return false;
    const d=new Date(t.invoiceDate);
    return d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth();
  }).reduce((s,t)=>s+(parseFloat(t.invoiceAmount)||0),0);

  // FI: selects stay controlled; text inputs are uncontrolled (no re-render while typing)
  const FI=({label,val,onChange,type="text",placeholder="",opts=null,w="auto",dataRef=null,field=null})=>
    <div style={{flex:`1 1 ${w}`}}>
      <div style={{fontSize:9,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:4}}>{label}</div>
      {opts
        ? <select value={val} onChange={e=>onChange(e.target.value)} style={{width:"100%",background:"#252d45",border:"1px solid #252d45",borderRadius:6,padding:"5px 8px",color:"#dde3f0",fontSize:12,fontFamily:"inherit",outline:"none"}}>
            {opts.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        : <input type={type} defaultValue={val} placeholder={placeholder}
            onChange={e=>{if(dataRef&&field)dataRef.current[field]=e.target.value;if(onChange)onChange(e.target.value);}}
            style={{width:"100%",background:"#252d45",border:"1px solid #252d45",borderRadius:6,padding:"5px 8px",color:"#dde3f0",fontSize:12,fontFamily:"inherit",outline:"none"}}/>
      }
    </div>;

  const tabs=[{k:"schedule",l:"📅 Schedule"},{k:"agreements",l:"📋 PM Agreements"},{k:"tickets",l:"🔧 Service Tickets"}];

  return <div style={{maxWidth:1200,margin:"0 auto",padding:"20px 18px"}}>
    {/* PM Form Modal */}
    {showPMForm&&<div style={{position:"fixed",inset:0,background:"#00000099",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setShowPMForm(false)}>
      <div style={{background:"#161b27",border:"1px solid #252d45",borderRadius:14,padding:"22px 24px",width:"100%",maxWidth:620,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:14,fontWeight:800,color:"#fff",marginBottom:16}}>{editPM?"Edit PM Agreement":"New PM Agreement"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <FI label="Agreement Name *" val={pmData.current.name} dataRef={pmData} field="name" onChange={null} placeholder="e.g. Crunch Fitness — Quarterly PM" w="260px"/>
            <FI label="Active" val={pmSelects.active?"Yes":"No"} onChange={v=>setPmSelects(s=>({...s,active:v==="Yes"}))} opts={["Yes","No"]} w="80px"/>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <FI label="Customer / Site" val={pmData.current.customer} dataRef={pmData} field="customer" onChange={null} placeholder="Company name" w="200px"/>
            <FI label="Address" val={pmData.current.address} dataRef={pmData} field="address" onChange={null} placeholder="Site address" w="220px"/>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <FI label="Contact Name" val={pmData.current.contact} dataRef={pmData} field="contact" onChange={null} placeholder="First Last" w="150px"/>
            <FI label="Phone" val={pmData.current.phone} dataRef={pmData} field="phone" onChange={null} placeholder="(xxx) xxx-xxxx" w="130px"/>
            <FI label="Email" val={pmData.current.email} dataRef={pmData} field="email" onChange={null} placeholder="email@co.com" w="180px"/>
          </div>
          <FI label="Equipment Covered" val={pmData.current.equipment} dataRef={pmData} field="equipment" onChange={null} placeholder="e.g. 3× Trane RTU, 2× Mitsubishi splits, DOAS unit"/>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <FI label="Service Frequency" val={pmSelects.frequency} onChange={v=>setPmSelects(s=>({...s,frequency:v}))} opts={PM_FREQUENCIES.map(f=>f.key)} w="130px"/>
            {pmSelects.frequency==="custom"&&<FI label="Every N Months" val={pmData.current.customMonths} dataRef={pmData} field="customMonths" onChange={null} type="number" placeholder="e.g. 2" w="100px"/>}
            <FI label="Last Service Date" val={pmData.current.lastService} dataRef={pmData} field="lastService" onChange={null} type="date" w="140px"/>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <FI label="Contract Value (annual $)" val={pmData.current.contractValue} dataRef={pmData} field="contractValue" onChange={null} type="number" placeholder="0" w="160px"/>
            <FI label="Per-Visit Invoice $" val={pmData.current.nextValue} dataRef={pmData} field="nextValue" onChange={null} type="number" placeholder="0" w="140px"/>
          </div>
          <div>
            <div style={{fontSize:9,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:4}}>Notes</div>
            <textarea defaultValue={pmData.current.notes||""} onChange={e=>{pmData.current.notes=e.target.value;}} rows={2} placeholder="Scope, access notes, special requirements..."
              style={{width:"100%",background:"#252d45",border:"1px solid #252d45",borderRadius:6,padding:"6px 8px",color:"#dde3f0",fontSize:12,fontFamily:"inherit",outline:"none",resize:"vertical"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
          {editPM&&<button onClick={()=>deletePM(editPM)} style={{padding:"7px 14px",background:"transparent",border:"1px solid #ff5c5c44",borderRadius:8,color:"#ff5c5c",fontSize:12,cursor:"pointer",fontFamily:"inherit",marginRight:"auto"}}>Delete</button>}
          <button onClick={()=>setShowPMForm(false)} style={{padding:"7px 14px",background:"transparent",border:"1px solid #252d45",borderRadius:8,color:"#6b7694",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
          <button onClick={savePM} style={{padding:"7px 18px",background:"#2ecc8722",border:"1px solid #2ecc8755",borderRadius:8,color:"#2ecc87",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Save Agreement</button>
        </div>
      </div>
    </div>}

    {/* Ticket Form Modal */}
    {showTicketForm&&<div style={{position:"fixed",inset:0,background:"#00000099",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setShowTicketForm(false)}>
      <div style={{background:"#161b27",border:"1px solid #252d45",borderRadius:14,padding:"22px 24px",width:"100%",maxWidth:620,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:14,fontWeight:800,color:"#fff",marginBottom:16}}>{editTicket?"Edit Service Ticket":"New Service Ticket"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <FI label="Linked PM Agreement" val={ticketSelects.pmId} onChange={v=>{
              const pm=pmAgreements.find(p=>String(p.id)===v);
              setTicketSelects(s=>({...s,pmId:v}));
              if(pm){ticketData.current.customer=pm.customer||ticketData.current.customer;ticketData.current.address=pm.address||ticketData.current.address;ticketData.current.equipment=pm.equipment||ticketData.current.equipment;}
            }} opts={["(none)",...pmAgreements.map(p=>String(p.id))]} w="200px"/>
            {ticketSelects.pmId&&ticketSelects.pmId!=="(none)"&&<div style={{flex:1,fontSize:11,color:"#6b7694",alignSelf:"flex-end",paddingBottom:6}}>
              {pmAgreements.find(p=>String(p.id)===ticketSelects.pmId)?.name}
            </div>}
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <FI label="Customer" val={ticketData.current.customer} dataRef={ticketData} field="customer" onChange={null} placeholder="Customer name" w="200px"/>
            <FI label="Address" val={ticketData.current.address} dataRef={ticketData} field="address" onChange={null} placeholder="Site address" w="220px"/>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <FI label="Type" val={ticketSelects.type} onChange={v=>setTicketSelects(s=>({...s,type:v}))} opts={TICKET_TYPES} w="140px"/>
            <FI label="Priority" val={ticketSelects.priority} onChange={v=>setTicketSelects(s=>({...s,priority:v}))} opts={PRIORITY} w="110px"/>
            <FI label="Status" val={ticketSelects.status} onChange={v=>setTicketSelects(s=>({...s,status:v}))} opts={TICKET_STATUS} w="120px"/>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <FI label="Scheduled Date" val={ticketData.current.scheduledDate} dataRef={ticketData} field="scheduledDate" onChange={null} type="date" w="140px"/>
            <FI label="Completed Date" val={ticketData.current.completedDate} dataRef={ticketData} field="completedDate" onChange={null} type="date" w="140px"/>
            <FI label="Technician" val={ticketData.current.tech} dataRef={ticketData} field="tech" onChange={null} placeholder="Tech name" w="140px"/>
          </div>
          <FI label="Equipment / Description" val={ticketData.current.equipment} dataRef={ticketData} field="equipment" onChange={null} placeholder="Units serviced, issue description"/>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <FI label="Labor Hours" val={ticketData.current.laborHours} dataRef={ticketData} field="laborHours" onChange={null} type="number" placeholder="0.0" w="100px"/>
            <FI label="Material Cost $" val={ticketData.current.materialCost} dataRef={ticketData} field="materialCost" onChange={null} type="number" placeholder="0" w="120px"/>
            <FI label="Invoice Amount $" val={ticketData.current.invoiceAmount} dataRef={ticketData} field="invoiceAmount" onChange={null} type="number" placeholder="0" w="120px"/>
            <FI label="Invoice Date" val={ticketData.current.invoiceDate} dataRef={ticketData} field="invoiceDate" onChange={null} type="date" w="140px"/>
          </div>
          <div>
            <div style={{fontSize:9,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:4}}>Notes</div>
            <textarea defaultValue={ticketData.current.notes||""} onChange={e=>{ticketData.current.notes=e.target.value;}} rows={2} placeholder="Work performed, parts used, follow-up required..."
              style={{width:"100%",background:"#252d45",border:"1px solid #252d45",borderRadius:6,padding:"6px 8px",color:"#dde3f0",fontSize:12,fontFamily:"inherit",outline:"none",resize:"vertical"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
          {editTicket&&<button onClick={()=>deleteTicket(editTicket)} style={{padding:"7px 14px",background:"transparent",border:"1px solid #ff5c5c44",borderRadius:8,color:"#ff5c5c",fontSize:12,cursor:"pointer",fontFamily:"inherit",marginRight:"auto"}}>Delete</button>}
          <button onClick={()=>setShowTicketForm(false)} style={{padding:"7px 14px",background:"transparent",border:"1px solid #252d45",borderRadius:8,color:"#6b7694",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
          <button onClick={saveTicket} style={{padding:"7px 18px",background:"#3d8ef822",border:"1px solid #3d8ef855",borderRadius:8,color:"#3d8ef8",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Save Ticket</button>
        </div>
      </div>
    </div>}

    {/* Summary pills */}
    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
      {[
        {l:"ACTIVE PM AGREEMENTS",v:totalActive,c:"#2ecc87"},
        {l:"OVERDUE VISITS",v:overdueCount,c:overdueCount>0?"#ff5c5c":"#6b7694"},
        {l:"DUE WITHIN 30d",v:dueSoonCount,c:dueSoonCount>0?"#f5a623":"#6b7694"},
        {l:"ANNUAL PM VALUE",v:fmtDollar(totalAnnualPMValue),c:"#c084fc"},
        {l:"OPEN TICKETS",v:openTickets,c:openTickets>0?"#fb923c":"#6b7694"},
        {l:"MTD REVENUE",v:fmtDollar(mtdRevenue),c:"#22d3ee"},
      ].map(p=><Pill key={p.l} label={p.l} value={p.v} color={p.c}/>)}
    </div>

    {/* Tab bar + action buttons */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",gap:2,borderBottom:"1px solid #252d45"}}>
        {tabs.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"7px 14px",background:"transparent",border:"none",borderBottom:tab===t.k?"2px solid #2ecc87":"2px solid transparent",color:tab===t.k?"#2ecc87":"#6b7694",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.l}</button>)}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{setEditPM(null);pmData.current={name:"",customer:"",address:"",contact:"",phone:"",email:"",equipment:"",frequency:"quarterly",customMonths:"",lastService:"",contractValue:"",nextValue:"",notes:"",active:true};setPmSelects({frequency:"quarterly",active:true});setShowPMForm(true);}} style={{padding:"6px 14px",background:"#2ecc8718",border:"1px solid #2ecc8744",borderRadius:7,color:"#2ecc87",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ PM Agreement</button>
        <button onClick={()=>{setEditTicket(null);ticketData.current={pmId:"",customer:"",address:"",type:"PM Service",priority:"Normal",scheduledDate:"",completedDate:"",tech:"",equipment:"",laborHours:"",materialCost:"",invoiceAmount:"",invoiceDate:"",status:"Open",notes:""};setTicketSelects({pmId:"",type:"PM Service",priority:"Normal",status:"Open"});setShowTicketForm(true);}} style={{padding:"6px 14px",background:"#3d8ef818",border:"1px solid #3d8ef844",borderRadius:7,color:"#3d8ef8",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Service Ticket</button>
      </div>
    </div>

    {/* ── SCHEDULE TAB ── */}
    {tab==="schedule"&&<div>
      {overdueCount>0&&<div style={{marginBottom:12,padding:"10px 14px",background:"#ff5c5c0c",border:"1px solid #ff5c5c33",borderRadius:8,fontSize:12,color:"#ff5c5c",fontWeight:700}}>
        🔴 {overdueCount} PM visit{overdueCount!==1?"s":""} overdue — contact customers to reschedule
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
        {/* PM Schedule */}
        <div>
          <div style={{fontSize:11,fontWeight:700,color:"#2ecc87",letterSpacing:"0.7px",textTransform:"uppercase",marginBottom:8,paddingBottom:5,borderBottom:"1px solid #2ecc8733"}}>PM Visits — Next 12 Months</div>
          {upcoming.length===0&&<div style={{fontSize:12,color:"#6b7694",fontStyle:"italic",padding:"8px 0"}}>No active PM agreements with scheduled visits. Add a PM agreement and set a last service date.</div>}
          {upcoming.map(pm=>{
            const dStr=pm.next?pm.next.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—";
            const urgColor=pm.overdue?"#ff5c5c":pm.dueSoon?"#f5a623":"#2ecc87";
            return <div key={pm.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",marginBottom:4,background:"#161b27",border:`1px solid ${pm.overdue?"#ff5c5c33":pm.dueSoon?"#f5a62333":"#252d45"}`,borderRadius:8}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:urgColor,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:"#dde3f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pm.customer||pm.name}</div>
                <div style={{fontSize:10,color:"#6b7694"}}>{pm.name} · {PM_FREQUENCIES.find(f=>f.key===pm.frequency)?.label||`Every ${pm.months}mo`}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:12,fontWeight:700,color:urgColor}}>{dStr}</div>
                <div style={{fontSize:10,color:urgColor}}>{pm.overdue?`${Math.abs(pm.daysUntil)}d overdue`:pm.daysUntil===0?"Today":`in ${pm.daysUntil}d`}</div>
              </div>
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>logVisit(pm)} title="Log visit today" style={{padding:"3px 8px",background:"#2ecc8718",border:"1px solid #2ecc8744",borderRadius:5,color:"#2ecc87",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓ Log</button>
                <button onClick={()=>openPM(pm)} style={{padding:"3px 8px",background:"transparent",border:"1px solid #252d45",borderRadius:5,color:"#6b7694",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>
              </div>
            </div>;
          })}
        </div>
        {/* Ticket Schedule */}
        <div>
          <div style={{fontSize:11,fontWeight:700,color:"#3d8ef8",letterSpacing:"0.7px",textTransform:"uppercase",marginBottom:8,paddingBottom:5,borderBottom:"1px solid #3d8ef833"}}>Open Tickets — Scheduled</div>
          {scheduledTickets.length===0&&<div style={{fontSize:12,color:"#6b7694",fontStyle:"italic",padding:"8px 0"}}>No open tickets with scheduled dates.</div>}
          {scheduledTickets.map(t=>{
            const pc=PRIORITY_COLORS[t.priority]||"#6b7694";
            const dStr=new Date(t.scheduledDate).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
            return <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",marginBottom:4,background:"#161b27",border:`1px solid ${pc}33`,borderRadius:8}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:pc,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:"#dde3f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.customer}</div>
                <div style={{fontSize:10,color:"#6b7694"}}>{t.type} · {t.tech||"Unassigned"}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:11,fontWeight:700,color:"#dde3f0"}}>{dStr}</div>
                <span style={{fontSize:9,color:pc,background:`${pc}18`,border:`1px solid ${pc}44`,borderRadius:3,padding:"1px 5px",fontWeight:700}}>{t.priority}</span>
              </div>
              <button onClick={()=>openTicket(t)} style={{padding:"3px 8px",background:"transparent",border:"1px solid #252d45",borderRadius:5,color:"#6b7694",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>
            </div>;
          })}
        </div>
      </div>
    </div>}

    {/* ── PM AGREEMENTS TAB ── */}
    {tab==="agreements"&&<div>
      {pmAgreements.length===0&&<div style={{fontSize:13,color:"#6b7694",fontStyle:"italic",padding:"24px 0",textAlign:"center"}}>No PM agreements yet. Click "+ PM Agreement" to add one.</div>}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {pmWithNext.map(pm=>{
          const urgColor=pm.overdue?"#ff5c5c":pm.dueSoon?"#f5a623":pm.active?"#2ecc87":"#6b7694";
          const nextStr=pm.next?pm.next.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—";
          const freq=PM_FREQUENCIES.find(f=>f.key===pm.frequency)?.label||`Every ${pm.months}mo`;
          const annualVal=(parseFloat(pm.nextValue)||0)*(pm.months>0?12/pm.months:0);
          return <div key={pm.id} style={{background:"#161b27",border:`1px solid ${pm.overdue?"#ff5c5c33":pm.dueSoon?"#f5a62333":"#252d45"}`,borderRadius:10,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:urgColor,flexShrink:0}}/>
            <div style={{flex:"1 1 200px",minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,color:pm.active?"#dde3f0":"#6b7694"}}>{pm.name}</div>
              <div style={{fontSize:11,color:"#6b7694",marginTop:1}}>{pm.customer}{pm.address?` · ${pm.address}`:""}</div>
              {pm.equipment&&<div style={{fontSize:10,color:"#6b7694",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🔧 {pm.equipment}</div>}
            </div>
            <div style={{textAlign:"center",flexShrink:0}}>
              <div style={{fontSize:10,color:"#6b7694"}}>Frequency</div>
              <div style={{fontSize:12,fontWeight:600,color:"#dde3f0"}}>{freq}</div>
            </div>
            <div style={{textAlign:"center",flexShrink:0}}>
              <div style={{fontSize:10,color:"#6b7694"}}>Next Visit</div>
              <div style={{fontSize:12,fontWeight:700,color:urgColor}}>{nextStr}</div>
              {pm.daysUntil!==null&&<div style={{fontSize:10,color:urgColor}}>{pm.overdue?`${Math.abs(pm.daysUntil)}d overdue`:pm.daysUntil===0?"Today":`in ${pm.daysUntil}d`}</div>}
            </div>
            <div style={{textAlign:"center",flexShrink:0}}>
              <div style={{fontSize:10,color:"#6b7694"}}>Per Visit</div>
              <div style={{fontSize:12,fontWeight:600,color:"#c084fc"}}>${parseFloat(pm.nextValue)||0}</div>
            </div>
            <div style={{textAlign:"center",flexShrink:0}}>
              <div style={{fontSize:10,color:"#6b7694"}}>Annual</div>
              <div style={{fontSize:12,fontWeight:600,color:"#c084fc"}}>${Math.round(annualVal)}</div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
              {!pm.active&&<span style={{fontSize:10,color:"#6b7694",background:"#252d45",borderRadius:4,padding:"2px 7px",fontWeight:600}}>Inactive</span>}
              {pm.overdue&&<span style={{fontSize:10,color:"#ff5c5c",background:"#ff5c5c18",border:"1px solid #ff5c5c44",borderRadius:4,padding:"2px 7px",fontWeight:700}}>Overdue</span>}
              <button onClick={()=>logVisit(pm)} style={{padding:"4px 10px",background:"#2ecc8718",border:"1px solid #2ecc8744",borderRadius:6,color:"#2ecc87",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓ Log Visit</button>
              <button onClick={()=>openPM(pm)} style={{padding:"4px 10px",background:"transparent",border:"1px solid #252d45",borderRadius:6,color:"#6b7694",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>
            </div>
          </div>;
        })}
      </div>
    </div>}

    {/* ── SERVICE TICKETS TAB ── */}
    {tab==="tickets"&&<div>
      {serviceTickets.length===0&&<div style={{fontSize:13,color:"#6b7694",fontStyle:"italic",padding:"24px 0",textAlign:"center"}}>No service tickets yet. Click "+ Service Ticket" to log one.</div>}
      {/* Group by status */}
      {TICKET_STATUS.map(status=>{
        const group=serviceTickets.filter(t=>t.status===status);
        if(!group.length)return null;
        const statusColor={Open:"#ff5c5c",Scheduled:"#3d8ef8","In Progress":"#f5a623",Completed:"#2ecc87",Invoiced:"#c084fc",Closed:"#6b7694"}[status]||"#6b7694";
        return <div key={status} style={{marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:statusColor,letterSpacing:"0.7px",textTransform:"uppercase",marginBottom:8,paddingBottom:5,borderBottom:`1px solid ${statusColor}33`}}>
            {status} — {group.length} ticket{group.length!==1?"s":""}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {group.sort((a,b)=>new Date(b.scheduledDate||0)-new Date(a.scheduledDate||0)).map(t=>{
              const pc=PRIORITY_COLORS[t.priority]||"#6b7694";
              const pm=pmAgreements.find(p=>String(p.id)===String(t.pmId));
              return <div key={t.id} style={{background:"#161b27",border:`1px solid ${pc}22`,borderRadius:9,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:pc,flexShrink:0}}/>
                <div style={{flex:"1 1 180px",minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#dde3f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.customer}</div>
                  <div style={{fontSize:10,color:"#6b7694"}}>{t.type}{pm?` · ${pm.name}`:""}{t.tech?` · ${t.tech}`:""}</div>
                  {t.equipment&&<div style={{fontSize:10,color:"#6b7694",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🔧 {t.equipment}</div>}
                </div>
                {t.scheduledDate&&<div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:10,color:"#6b7694"}}>Scheduled</div>
                  <div style={{fontSize:11,fontWeight:600,color:"#dde3f0"}}>{new Date(t.scheduledDate).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                </div>}
                {t.laborHours&&<div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:10,color:"#6b7694"}}>Hours</div>
                  <div style={{fontSize:11,fontWeight:600,color:"#f5a623"}}>{t.laborHours}h</div>
                </div>}
                {t.invoiceAmount&&<div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:10,color:"#6b7694"}}>Invoice</div>
                  <div style={{fontSize:12,fontWeight:700,color:"#2ecc87"}}>${parseFloat(t.invoiceAmount).toLocaleString()}</div>
                </div>}
                <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                  <span style={{fontSize:9,color:pc,background:`${pc}18`,border:`1px solid ${pc}44`,borderRadius:3,padding:"1px 6px",fontWeight:700}}>{t.priority}</span>
                  <button onClick={()=>openTicket(t)} style={{padding:"4px 10px",background:"transparent",border:"1px solid #252d45",borderRadius:6,color:"#6b7694",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>
                </div>
              </div>;
            })}
          </div>
        </div>;
      })}
    </div>}
  </div>;
}

function ProjectDashboard({projectKeys,allStatus,getStatus,setStatus,STATUS_OPTIONS,STATUS_COLORS,allOverrides,allMk,DEFAULT_MK,UPeff,allManualProjects,addManualProject,deleteManualProject,onOpen}){
  const [editKey,setEditKey]=useState(null);
  const [lienFilter,setLienFilter]=useState(false);
  const [showNewModal,setShowNewModal]=useState(false);
  const [newName,setNewName]=useState("");
  const [newStatus,setNewStatus]=useState("Awarded");

  const isManual=(k)=>!!(allManualProjects&&allManualProjects[k]);

  const getProjectName=(k)=>isManual(k)?(allManualProjects[k]?.name||k.split("::")[1]||k):PROJECTS[k]?.projectInfo?.detectedProjectName||k;
  const getProjectAddress=(k)=>isManual(k)?(getStatus(k).jobAddress||"—"):PROJECTS[k]?.projectInfo?.detectedAddress||"";
  const getProjectType=(k)=>isManual(k)?"Manual Entry":PROJECTS[k]?.projectInfo?.buildingType?.split("—")[0].trim()||"";

  const getBidTotal=(key)=>{
    if(isManual(key)){
      return parseFloat(getStatus(key).contractValue)||0;
    }
    try{
      const tk=PROJECTS[key];
      const mk=allMk[key]||DEFAULT_MK;
      const overrides=allOverrides[key]||tk.defaultOverrides||{};
      const dr=buildDucts(tk.airBalance,tk.projectInfo.totalSF);
      const est=buildEst(tk,dr,mk,overrides,{},{},{},UPeff);
      return est.total;
    }catch{return 0;}
  };

  const handleAddProject=()=>{
    if(!newName.trim())return;
    const key=addManualProject(newName.trim());
    setStatus(key,"status",newStatus);
    setNewName("");
    setShowNewModal(false);
    setEditKey(key);
  };

  // Compute lien status across all projects
  const getLienStatus=(k)=>{
    const st=getStatus(k);
    const netTerms=parseInt(st.netTerms)||30;
    const invoices=st.invoices||[];
    const unpaid=invoices.filter(i=>i.status!=="Paid"&&i.dateSent);
    if(!unpaid.length)return{maxDays:0,count60:0,count90:0,totalAtRisk:0};
    let maxDays=0,count60=0,count90=0,totalAtRisk=0;
    unpaid.forEach(inv=>{
      const sent=parseDate(inv.dateSent);
      if(!sent)return;
      const dueDate=new Date(sent.getTime()+netTerms*86400000);
      const days=daysBetween(dueDate,today);
      if(days>0){
        maxDays=Math.max(maxDays,days);
        if(days>=60){count60++;totalAtRisk+=parseFloat(inv.amount)||0;}
        if(days>=90)count90++;
      }
    });
    return{maxDays,count60,count90,totalAtRisk};
  };

  const awarded=projectKeys.filter(k=>["Awarded","In Progress","Complete"].includes(getStatus(k).status));
  const bidding=projectKeys.filter(k=>getStatus(k).status==="Bidding");
  const totalAwarded=awarded.reduce((s,k)=>{const cv=parseFloat(getStatus(k).contractValue)||getBidTotal(k);return s+cv;},0);
  const totalBilled=awarded.reduce((s,k)=>{const inv=getStatus(k).invoices||[];return s+inv.reduce((a,i)=>a+(parseFloat(i.amount)||0),0);},0);
  const totalPaid=awarded.reduce((s,k)=>{const inv=getStatus(k).invoices||[];return s+inv.filter(i=>i.status==="Paid").reduce((a,i)=>a+(parseFloat(i.amount)||0),0);},0);
  const totalPending=totalBilled-totalPaid;
  const totalBidding=bidding.reduce((s,k)=>s+getBidTotal(k),0);
  const lienProjects=projectKeys.filter(k=>getLienStatus(k).count60>0);
  const totalAtRisk=lienProjects.reduce((s,k)=>s+getLienStatus(k).totalAtRisk,0);

  // Export lien data for integration with lien agent
  const exportLienData=()=>{
    const data=lienProjects.map(k=>{
      const tk=PROJECTS[k];
      const st=getStatus(k);
      const ls=getLienStatus(k);
      const netTerms=parseInt(st.netTerms)||30;
      return{
        project:tk.projectInfo.detectedProjectName,
        address:tk.projectInfo.detectedAddress,
        jobAddress:st.jobAddress||tk.projectInfo.detectedAddress,
        ownerName:st.ownerName||"",
        ownerContact:st.ownerContact||"",
        ownerPhone:st.ownerPhone||"",
        gcCompany:st.gcCompany||"",
        gcPM:st.gcPM||"",
        gcPhone:st.gcPhone||"",
        gcContact:st.gcContact||"",
        poNumber:st.poNumber||"",
        contractValue:parseFloat(st.contractValue)||getBidTotal(k),
        awardDate:st.awardDate||"",
        ntpDate:st.ntpDate||"",
        invoices:(st.invoices||[]).filter(i=>i.status!=="Paid"&&i.dateSent).map(inv=>{
          const sent=parseDate(inv.dateSent);
          const dueDate=sent?new Date(sent.getTime()+netTerms*86400000):null;
          return{
            payApp:inv.num,
            amount:parseFloat(inv.amount)||0,
            dateSent:inv.dateSent,
            dueDate:dueDate?dueDate.toISOString().split("T")[0]:"",
            daysPastDue:dueDate?Math.max(0,daysBetween(dueDate,today)):0,
            milestone:ls.maxDays>=90?"90-DAY":ls.maxDays>=60?"60-DAY":"<60-DAY",
          };
        }),
        maxDaysPastDue:ls.maxDays,
        totalAtRisk:ls.totalAtRisk,
        lienMilestone:ls.maxDays>=90?"90-DAY":ls.maxDays>=60?"60-DAY":"<60-DAY",
      };
    });
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="lien_agent_export.json";
    a.click();
  };

  const statusGroups=[
    {label:"Active",statuses:["Awarded","In Progress"],color:"#2ecc87"},
    {label:"Bidding",statuses:["Bidding"],color:"#3d8ef8"},
    {label:"Complete",statuses:["Complete"],color:"#c084fc"},
    {label:"Lost / On Hold",statuses:["Lost","On Hold"],color:"#6b7694"},
  ];

  // Bid age helpers
  const getBidAgeDays=(k)=>{
    const st=getStatus(k);
    const d=parseDate(st.bidDate);
    if(!d)return null;
    return daysBetween(d,today);
  };
  const isBidExpired=(k)=>{ const days=getBidAgeDays(k); return days!==null&&days>=60; };
  const isBidFollowUp=(k)=>{ const days=getBidAgeDays(k); return days!==null&&days>=30&&days<60; };

  // GC pay performance — aggregate across all projects by GC company name
  const gcStats={};
  projectKeys.forEach(k=>{
    const st=getStatus(k);
    const gc=(st.gcCompany||st.gcContact||"").trim();
    if(!gc)return;
    const invoices=st.invoices||[];
    invoices.forEach(inv=>{
      if(inv.status!=="Paid"||!inv.dateSent||!inv.datePaid)return;
      const sent=parseDate(inv.dateSent);
      const paid=parseDate(inv.datePaid);
      if(!sent||!paid)return;
      const days=daysBetween(sent,paid);
      if(days<0)return;
      if(!gcStats[gc])gcStats[gc]={gc,days:[],amounts:[],projects:new Set(),worstDays:0};
      gcStats[gc].days.push(days);
      gcStats[gc].amounts.push(parseFloat(inv.amount)||0);
      gcStats[gc].projects.add(k);
      gcStats[gc].worstDays=Math.max(gcStats[gc].worstDays,days);
    });
  });
  const gcRows=Object.values(gcStats).map(r=>({
    gc:r.gc,
    avgDays:Math.round(r.days.reduce((s,d)=>s+d,0)/r.days.length),
    worstDays:r.worstDays,
    invoiceCount:r.days.length,
    totalPaid:r.amounts.reduce((s,a)=>s+a,0),
    projectCount:r.projects.size,
  })).sort((a,b)=>b.avgDays-a.avgDays);

  const payRating=(avg,net)=>{
    const net30=net||30;
    if(avg<=net30)return{label:"On Time",color:"#2ecc87"};
    if(avg<=net30+15)return{label:"Slightly Late",color:"#f5a623"};
    if(avg<=net30+30)return{label:"Late",color:"#fb923c"};
    return{label:"Slow Pay",color:"#ff5c5c"};
  };

  const [showGCScorecard,setShowGCScorecard]=useState(false);

  const renderProjectRow=(k,groupColor)=>{
            const st=getStatus(k);
            const tk=PROJECTS[k]; // null for manual projects — use helper functions
            const bidTotal=getBidTotal(k);
            const contractVal=parseFloat(st.contractValue)||bidTotal;
            const invoices=st.invoices||[];
            const totalInv=invoices.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
            const totalPd=invoices.filter(i=>i.status==="Paid").reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
            const billedPct=contractVal>0?Math.round(totalInv/contractVal*100):0;
            const paidPct=contractVal>0?Math.round(totalPd/contractVal*100):0;
            const isEdit=editKey===k;
            const color=isBidExpired(k)?"#6b7694":STATUS_COLORS[st.status];
            const ls=getLienStatus(k);
            const isAwarded=["Awarded","In Progress","Complete"].includes(st.status);
            const retPct=parseFloat(st.retainage)||10;
            const retHeld=totalPd*(retPct/100);
            const netReceived=totalPd-retHeld;
            const bidAgeDays=getBidAgeDays(k);
            const followUp=isBidFollowUp(k);
            const expired=isBidExpired(k);

            return <div key={k} style={{background:"#161b27",border:`1px solid ${ls.count60>0?"#ff5c5c33":followUp?"#f5a62344":isEdit?"#3d8ef855":"#252d45"}`,borderRadius:10,overflow:"hidden",opacity:expired?0.75:1}}>
              {/* Main row */}
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",flexWrap:"wrap",cursor:"pointer"}} onClick={()=>setEditKey(isEdit?null:k)}>
                <div style={{width:8,height:8,borderRadius:"50%",background:ls.count60>0?"#ff5c5c":followUp?"#f5a623":color,flexShrink:0}}/>
                <div style={{flex:"1 1 180px",minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:expired?"#6b7694":"#dde3f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {getProjectName(k)}
                    {isManual(k)&&<span style={{marginLeft:6,fontSize:9,color:"#6b7694",background:"#252d45",borderRadius:3,padding:"1px 5px",fontWeight:700,letterSpacing:"0.3px"}}>MANUAL</span>}
                    {followUp&&<span style={{marginLeft:6,fontSize:10,color:"#f5a623",background:"#f5a62318",border:"1px solid #f5a62344",borderRadius:4,padding:"1px 7px",fontWeight:700}}>⏰ Follow up ({bidAgeDays}d)</span>}
                    {expired&&<span style={{marginLeft:6,fontSize:10,color:"#6b7694",background:"#252d45",borderRadius:4,padding:"1px 7px",fontWeight:700}}>Expired ({bidAgeDays}d ago)</span>}
                    {ls.maxDays>=90&&<span style={{marginLeft:6,fontSize:10,color:"#ff5c5c",fontWeight:800}}>🔴 {ls.count90} inv. 90d+</span>}
                    {ls.maxDays>=60&&ls.maxDays<90&&<span style={{marginLeft:6,fontSize:10,color:"#fb923c",fontWeight:800}}>🟠 {ls.count60} inv. 60d+</span>}
                  </div>
                  <div style={{fontSize:11,color:"#6b7694",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{getProjectAddress(k)}</div>
                </div>
                <div style={{textAlign:"right",whiteSpace:"nowrap"}}>
                  <div style={{fontSize:10,color:"#6b7694"}}>Bid / Contract</div>
                  <div style={{fontSize:12,fontWeight:700,color:color}}>{fmtDollar(contractVal)}</div>
                </div>
                {isAwarded&&<>
                  <div style={{textAlign:"right",whiteSpace:"nowrap"}}>
                    <div style={{fontSize:10,color:"#6b7694"}}>Invoiced</div>
                    <div style={{fontSize:12,fontWeight:700,color:"#f5a623"}}>{fmtDollar(totalInv)} <span style={{fontSize:10,color:"#6b7694"}}>({billedPct}%)</span></div>
                  </div>
                  <div style={{textAlign:"right",whiteSpace:"nowrap"}}>
                    <div style={{fontSize:10,color:"#6b7694"}}>Collected</div>
                    <div style={{fontSize:12,fontWeight:700,color:"#2ecc87"}}>{fmtDollar(totalPd)} <span style={{fontSize:10,color:"#6b7694"}}>({paidPct}%)</span></div>
                  </div>
                  {contractVal>0&&<div style={{width:90,flexShrink:0}}>
                    <div style={{position:"relative",height:6,background:"#252d45",borderRadius:3,overflow:"hidden"}}>
                      <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${Math.min(billedPct,100)}%`,background:"#f5a62344",borderRadius:3}}/>
                      <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${Math.min(paidPct,100)}%`,background:"#2ecc87",borderRadius:3}}/>
                    </div>
                    <div style={{fontSize:9,color:"#6b7694",marginTop:2,textAlign:"right"}}>{100-billedPct}% unbilled</div>
                  </div>}
                  {ls.totalAtRisk>0&&<div style={{textAlign:"right",whiteSpace:"nowrap"}}>
                    <div style={{fontSize:10,color:"#ff5c5c",fontWeight:700}}>At Risk</div>
                    <div style={{fontSize:12,fontWeight:800,color:"#ff5c5c"}}>{fmtDollar(ls.totalAtRisk)}</div>
                  </div>}
                </>}
                <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                  <span style={{fontSize:11,fontWeight:700,color,background:`${color}18`,border:`1px solid ${color}44`,borderRadius:4,padding:"2px 8px"}}>{expired?"Expired":st.status}</span>
                  {!isManual(k)&&<button onClick={e=>{e.stopPropagation();onOpen(k);}} style={{padding:"4px 10px",background:"#3d8ef818",border:"1px solid #3d8ef844",borderRadius:6,color:"#3d8ef8",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Open →</button>}
                  {isManual(k)&&<button onClick={e=>{e.stopPropagation();if(window.confirm("Delete this project?"))deleteManualProject(k);}} style={{padding:"4px 8px",background:"transparent",border:"1px solid #ff5c5c33",borderRadius:6,color:"#ff5c5c",fontSize:11,cursor:"pointer",fontFamily:"inherit",opacity:0.6}}>🗑</button>}
                </div>
              </div>
              {/* Expanded panel */}
              {isEdit&&<div style={{borderTop:"1px solid #252d45",background:"#1c2235",padding:"14px 16px"}}>
                <ProjectInfoPanel k={k} st={st} setStatus={setStatus} STATUS_OPTIONS={STATUS_OPTIONS} STATUS_COLORS={STATUS_COLORS} bidTotal={bidTotal}/>
                {isAwarded&&<CostTracker k={k} st={st} setStatus={setStatus} contractVal={contractVal} totalInv={totalInv} totalPd={totalPd} retPct={retPct}/>}
                {isAwarded&&<InvoiceLedger k={k} st={st} setStatus={setStatus}/>}
              </div>}

const LS_KEYS=["takeoff_manual_projects","takeoff_status","takeoff_up","takeoff_mk","takeoff_overrides","takeoff_miscqty","takeoff_pipingqty","takeoff_catmult","takeoff_pm_agreements","takeoff_service_tickets"];

// localStorage helpers (always available as cache/fallback)
function lsGet(key,fallback){try{const v=localStorage.getItem(key);if(v===null)return fallback;return JSON.parse(v);}catch{return fallback;}}
function lsSet(key,value){try{localStorage.setItem(key,JSON.stringify(value));}catch(e){console.warn("lsSet failed:",e);}}

// Supabase helpers
async function sbGet(key,fallback){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/app_data?key=eq.${key}&select=value`,{headers:SB_HEADERS});
    if(!r.ok)return fallback;
    const d=await r.json();
    return d.length>0?d[0].value:fallback;
  }catch{return fallback;}
}
async function sbSet(key,value){
  try{
    await fetch(`${SB_URL}/rest/v1/app_data`,{
      method:"POST",
      headers:{...SB_HEADERS,"Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify({key,value,updated_at:new Date().toISOString()})
    });
  }catch(e){console.warn("sbSet failed:",e);}
}

// Export all data as JSON backup file
function exportData(){
  const bundle={};
  LS_KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v!==null)bundle[k]=JSON.parse(v);});
  const blob=new Blob([JSON.stringify(bundle,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`hvac-takeoff-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

// Import backup JSON — writes to both localStorage and Supabase
function importData(file,onDone){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const bundle=JSON.parse(e.target.result);
      LS_KEYS.forEach(k=>{
        if(bundle[k]!==undefined){
          localStorage.setItem(k,JSON.stringify(bundle[k]));
          sbSet(k,bundle[k]);
        }
      });
      onDone(true);
    }catch{onDone(false);}
  };
  reader.readAsText(file);
}

  const setOverride=(cat,field,val)=>setAllOverrides(all=>{
    const next={...all,[selected]:{...(all[selected]||{}),[cat]:{...((all[selected]||{})[cat]||{}),[field]:val}}};
    dbSave("takeoff_overrides",next);return next;
  });

  const miscQty=allMiscQty[selected]||{};
  const setMiscQty=(key,field,val)=>setAllMiscQty(all=>{
    const next={...all,[selected]:{...(all[selected]||{}),[key]:{...((all[selected]||{})[key]||{}),[field]:val}}};
    dbSave("takeoff_miscqty",next);return next;
  });

  const pipingQty=allPipingQty[selected]||{};
  const setPipingQty=(key,field,val)=>setAllPipingQty(all=>{
    const next={...all,[selected]:{...(all[selected]||{}),[key]:{...((all[selected]||{})[key]||{}),[field]:val}}};
    dbSave("takeoff_pipingqty",next);return next;
  });

  const catMult=allCatMult[selected]||{};
  const setCatMult=(cat,val)=>setAllCatMult(all=>{
    const next={...all,[selected]:{...(all[selected]||{}),[cat]:val}};
    dbSave("takeoff_catmult",next);return next;
  });

  const tk=PROJECTS[selected]||null;
  const dr=tk?buildDucts(tk.airBalance,tk.projectInfo.totalSF):[];
  const est=tk?buildEst(tk,dr,mk,overrides,miscQty,pipingQty,catMult,UPeff):{total:0,direct:0,bid:0,taxAmt:0,items:[]};
  const dd=dr.map(r=>({...r,roundDia:`${r.roundDia}"Ø`,velocity:`${r.velocity} FPM`}));
  const hiddenPiping=p=>{const d=(p.description||"").toLowerCase(),m=(p.material||"").toLowerCase(),n=(p.notes||"").toLowerCase();return d.includes("domestic")||d.includes("hot water")||d.includes("cold water")||d.includes("dhw")||d.includes("water supply")||d.includes("water service")||d.includes("natural gas")||d.includes("gas line")||d.includes("gas pip")||d.includes("gas rough")||d.includes("gas connection")||d.includes("gas meter")||m.includes("black steel")||m.includes("gas")||((n.includes("gas")||n.includes("plumbing")||n.includes("domestic"))&&(d.includes("water")||d.includes("gas")));};
  const ti=tk?((tk.equipment?.length||0)+(tk.ductwork?.length||0)+(tk.piping||[]).filter(p=>!hiddenPiping(p)).length+(tk.diffusers?.length||0)+(tk.controls?.length||0)):0;

  const savePmAgreements=(v)=>{setPmAgreements(v);dbSave("takeoff_pm_agreements",v);};
  const saveServiceTickets=(v)=>{setServiceTickets(v);dbSave("takeoff_service_tickets",v);};

  return <div style={{minHeight:"100vh",background:"#0d1117",color:"#dde3f0",fontFamily:"'IBM Plex Sans','Segoe UI',sans-serif"}}>
    <style>{`@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');*{box-sizing:border-box}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#252d45;border-radius:3px}@keyframes spin{to{transform:rotate(360deg)}}`}</style>

    {/* Import modal */}
    {showImport&&<div style={{position:"fixed",inset:0,background:"#00000099",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>{setShowImport(false);setImportMsg("");}}>
      <div style={{background:"#161b27",border:"1px solid #252d45",borderRadius:14,padding:"24px 28px",minWidth:320,maxWidth:440}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:14,fontWeight:800,color:"#fff",marginBottom:8}}>Import Backup</div>
        <div style={{fontSize:12,color:"#6b7694",marginBottom:18,lineHeight:1.6}}>Select a <code style={{color:"#f5a623"}}>.json</code> backup file exported from this app. All current data will be replaced.</div>
        <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{
          if(!e.target.files[0])return;
          importData(e.target.files[0],(ok)=>{
            if(ok){setImportMsg("✓ Import successful — reloading…");setTimeout(()=>window.location.reload(),1200);}
            else setImportMsg("✗ Failed — file may be corrupted or wrong format.");
          });
        }}/>
        {importMsg
          ? <div style={{fontSize:13,fontWeight:700,color:importMsg.startsWith("✓")?"#2ecc87":"#ff5c5c",padding:"10px 0"}}>{importMsg}</div>
          : <button onClick={()=>importRef.current?.click()} style={{width:"100%",padding:"10px",background:"#3d8ef822",border:"1px solid #3d8ef855",borderRadius:8,color:"#3d8ef8",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Choose File…</button>
        }
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}>
          <button onClick={()=>{setShowImport(false);setImportMsg("");}} style={{padding:"7px 16px",background:"transparent",border:"1px solid #252d45",borderRadius:8,color:"#6b7694",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
        </div>
      </div>
    </div>}

    <div style={{background:"#161b27",borderBottom:"1px solid #252d45",padding:"14px 24px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <div style={{fontFamily:"monospace",fontSize:12,fontWeight:600,color:"#f5a623",background:"#f5a62318",border:"1px solid #f5a62344",borderRadius:6,padding:"3px 10px"}}>MECH</div>
      <div>
        <div style={{fontSize:15,fontWeight:700,color:"#ffffff"}}>HVAC Plan Takeoff Agent</div>
        <div style={{fontSize:11,color:"#6b7694"}}>Full scope · Duct sizing · Bid estimate · CSV export</div>
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <button onClick={exportData} style={{padding:"5px 12px",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:"#2ecc8718",border:"1px solid #2ecc8744",color:"#2ecc87"}}>⬇ Export</button>
        <button onClick={()=>setShowImport(true)} style={{padding:"5px 12px",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:"#3d8ef818",border:"1px solid #3d8ef844",color:"#3d8ef8"}}>⬆ Import</button>
        <div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:7,background:"#252d4533",border:"1px solid #252d45"}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:syncStatus==="synced"?"#2ecc87":syncStatus==="syncing"?"#f5a623":"#ff5c5c"}}/>
          <span style={{fontSize:10,fontWeight:700,color:syncStatus==="synced"?"#2ecc87":syncStatus==="syncing"?"#f5a623":"#ff5c5c",letterSpacing:"0.3px"}}>
            {syncStatus==="synced"?"Synced":syncStatus==="syncing"?"Syncing…":"Offline"}
          </span>
        </div>
        <button onClick={()=>setView("projects")} style={{padding:"6px 14px",background:view==="projects"?"#f5a62322":"transparent",border:`1px solid ${view==="projects"?"#f5a62355":"#252d45"}`,borderRadius:8,color:view==="projects"?"#f5a623":"#6b7694",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>📋 Projects</button>
        <button onClick={()=>setView("service")} style={{padding:"6px 14px",background:view==="service"?"#2ecc8722":"transparent",border:`1px solid ${view==="service"?"#2ecc8755":"#252d45"}`,borderRadius:8,color:view==="service"?"#2ecc87":"#6b7694",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🔧 Service</button>
        <button onClick={()=>setView("pops")} style={{padding:"6px 14px",background:view==="pops"?"#5b8dee22":"transparent",border:`1px solid ${view==="pops"?"#5b8dee55":"#252d45"}`,borderRadius:8,color:view==="pops"?"#5b8dee":"#6b7694",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🛒 Pops</button>
        <button onClick={()=>setView("takeoff")} style={{padding:"6px 14px",background:view==="takeoff"?"#3d8ef822":"transparent",border:`1px solid ${view==="takeoff"?"#3d8ef855":"#252d45"}`,borderRadius:8,color:view==="takeoff"?"#3d8ef8":"#6b7694",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>📐 Takeoff</button>
        {view==="takeoff"&&<div style={{background:"#2ecc8722",border:"1px solid #2ecc8755",borderRadius:8,padding:"6px 14px"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#2ecc87"}}>Bid: ${Math.round(est.total).toLocaleString()}</span>
        </div>}
      </div>
    </div>

    {/* ── POPS VIEW ── */}
    {view==="pops"&&<PopsView takeoffProjects={PROJECTS} allManualProjects={allManualProjects} allStatus={allStatus}/>}

      allStatus={allStatus}
      projectKeys={[...Object.keys(PROJECTS),...Object.keys(allManualProjects)]}
      popsPos={popsPos}
    />}

    {/* ── SERVICE & PM VIEW ── */}
    {view==="service"&&<ServiceView
      pmAgreements={pmAgreements} savePmAgreements={savePmAgreements}
      serviceTickets={serviceTickets} saveServiceTickets={saveServiceTickets}
    />}

    {/* ── PROJECTS DASHBOARD ── */}
    {view==="projects"&&<ProjectDashboard
      projectKeys={projectKeys}
      allStatus={allStatus}
      getStatus={getStatus}
      setStatus={setStatus}
      STATUS_OPTIONS={STATUS_OPTIONS}
      STATUS_COLORS={STATUS_COLORS}
      allOverrides={allOverrides}
      allMk={allMk}
      DEFAULT_MK={DEFAULT_MK}
      UPeff={UPeff}
      allManualProjects={allManualProjects}
      addManualProject={addManualProject}
      deleteManualProject={deleteManualProject}
      onOpen={(k)=>{
        if(allManualProjects[k])return; // manual projects have no takeoff view
        setSelected(k);setView("takeoff");setTab("estimate");
      }}
    />}

    {/* ── TAKEOFF VIEW ── */}
    {view==="takeoff"&&<div style={{maxWidth:1040,margin:"0 auto",padding:"20px 18px"}}>
      {projectKeys.length>1&&<div style={{marginBottom:16}}>
        <label style={{fontSize:10,fontWeight:700,color:"#6b7694",letterSpacing:"0.8px",textTransform:"uppercase"}}>Project</label>
        <select value={selected} onChange={e=>{setSelected(e.target.value);setTab("estimate");}}
          style={{marginTop:6,width:"100%",background:"#161b27",border:"1px solid #252d45",borderRadius:8,padding:"10px 12px",color:"#dde3f0",fontSize:13,fontFamily:"inherit",outline:"none"}}>
          {projectKeys.filter(k=>PROJECTS[k]).map(k=><option key={k} value={k}>{k}</option>)}
        </select>
      </div>}
      {!tk&&<div style={{padding:"32px",textAlign:"center",color:"#6b7694",fontSize:13}}>This project was added manually and has no takeoff data. Use the Projects view to manage billing and details.</div>}
      {tk&&<>
      <div style={{background:"#161b27",border:"1px solid #252d45",borderRadius:12,padding:"14px 18px",marginBottom:16,display:"flex",gap:18,flexWrap:"wrap",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.8px",textTransform:"uppercase"}}>Project</div>
          <div style={{fontSize:15,fontWeight:700,color:"#ffffff",marginTop:2}}>{tk.projectInfo.detectedProjectName}</div>
          <div style={{fontSize:12,color:"#6b7694",marginTop:2}}>{tk.projectInfo.detectedAddress}</div>
        </div>
        <div><div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.8px",textTransform:"uppercase"}}>Drawing</div><div style={{fontSize:13,color:"#dde3f0",marginTop:2,fontFamily:"monospace"}}>{tk.projectInfo.detectedDrawingNumber}</div></div>
        <div><div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.8px",textTransform:"uppercase"}}>SF</div><div style={{fontSize:13,color:"#dde3f0",marginTop:2}}>{tk.projectInfo.totalSF?.toLocaleString()} SF</div></div>
        {/* Status selector */}
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          <div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.8px",textTransform:"uppercase"}}>Status</div>
          <select value={getStatus(selected).status} onChange={e=>setStatus(selected,"status",e.target.value)}
            style={{background:`${STATUS_COLORS[getStatus(selected).status]}18`,border:`1px solid ${STATUS_COLORS[getStatus(selected).status]}55`,borderRadius:6,padding:"4px 10px",color:STATUS_COLORS[getStatus(selected).status],fontSize:12,fontWeight:700,fontFamily:"inherit",outline:"none",cursor:"pointer"}}>
            {STATUS_OPTIONS.map(s=><option key={s} value={s} style={{background:"#161b27",color:"#dde3f0"}}>{s}</option>)}
          </select>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>exportCSV(tk,dr,est,overrides)} style={{background:"#2ecc8722",border:"1px solid #2ecc8755",borderRadius:8,padding:"8px 16px",color:"#2ecc87",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>⬇ Export CSV</button>
        </div>
      </div>
      <div style={{background:"#3d8ef812",border:"1px solid #3d8ef833",borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#dde3f0",lineHeight:1.7}}>
        <span style={{color:"#3d8ef8",fontWeight:700,marginRight:8}}>SCOPE:</span>{tk.scopeSummary}
      </div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}}>
        <Pill label="LINE ITEMS"    value={ti} color="#f5a623"/>
        <Pill label="EQUIPMENT"     value={tk.equipment.length} color="#3d8ef8"/>
        <Pill label="DUCT SEGMENTS" value={dr.length} color="#22d3ee"/>
        <Pill label="TOTAL DUCT LF" value={dr.reduce((s,r)=>s+r.totalLF,0)} color="#22d3ee"/>
        <Pill label="DIFFUSERS"     value={tk.diffusers.length} color="#c084fc"/>
        <Pill label="DIRECT COST"   value={fmtDollar(est.direct)} color="#2ecc87"/>
        <Pill label="BID TO GC"     value={fmtDollar(est.bid)} color="#2ecc87"/>
      </div>
      <div style={{display:"flex",gap:2,borderBottom:"1px solid #252d45",overflowX:"auto"}}>
        {CATS.map(cat=><button key={cat.key} onClick={()=>setTab(cat.key)} style={{
          background:tab===cat.key?`${cat.color}18`:"transparent",border:"none",
          borderBottom:tab===cat.key?`2px solid ${cat.color}`:"2px solid transparent",
          padding:"9px 13px",color:tab===cat.key?cat.color:"#6b7694",
          fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",transition:"all 0.15s"}}>
          {cat.icon} {cat.label}
          {cat.key==="estimate"&&<span style={{marginLeft:4,fontSize:10,opacity:0.8}}>{fmtDollar(est.total)}</span>}
          {cat.key==="ductSizing"&&<span style={{marginLeft:4,fontSize:10,opacity:0.7}}>({dr.length})</span>}
          {cat.key==="calibrate"&&<span style={{marginLeft:4,fontSize:10,opacity:0.7}}>({Object.keys(upOverrides).length}✓)</span>}
          {!["ductSizing","estimate","calibrate"].includes(cat.key)&&<span style={{marginLeft:4,fontSize:10,opacity:0.7}}>({(tk[cat.key]||[]).length})</span>}
        </button>)}
      </div>
      <div style={{background:"#1c2235",border:"1px solid #252d45",borderTop:"none",borderRadius:"0 0 12px 12px",padding:18}}>
        {tab==="equipment"  &&<EquipmentTab tk={tk} />}
        {tab==="ductwork"   &&<Tbl cc="qty" rows={tk.ductwork}   cols={[{k:"description",l:"Description",w:1},{k:"size",l:"Size"},{k:"qty",l:"LF"},{k:"gauge",l:"Gauge"},{k:"system",l:"System"},{k:"notes",l:"Notes",w:1}]}/>}
        {tab==="piping"     &&<div style={{color:"#6b7694",fontSize:13,padding:"12px 0",fontStyle:"italic"}}>Piping is excluded — not in scope for this contractor.</div>}
        {tab==="diffusers"  &&<Tbl cc="qty" rows={tk.diffusers}  cols={[{k:"description",l:"Description",w:1},{k:"size",l:"Size"},{k:"qty",l:"Qty"},{k:"type",l:"Type"},{k:"cfm",l:"CFM"},{k:"notes",l:"Notes",w:1}]}/>}
        {tab==="controls"   &&<Tbl cc="qty" rows={tk.controls}   cols={[{k:"description",l:"Description",w:1},{k:"qty",l:"Qty"},{k:"unit",l:"Unit"},{k:"manufacturer",l:"Mfr"},{k:"notes",l:"Notes",w:1}]}/>}
        {tab==="ductSizing" &&<div>
          <div style={{fontSize:11,color:"#6b7694",marginBottom:12}}>ASHRAE equal-friction · Mains 800-900 FPM · Branches 600-700 FPM · From air balance schedule CFM</div>
          <Tbl cc="size" rows={dd} cols={[{k:"zone",l:"Zone",w:1},{k:"segment",l:"Segment",w:1},{k:"cfm",l:"CFM"},{k:"size",l:"Rect Size"},{k:"roundDia",l:"Round Ø"},{k:"velocity",l:"FPM"},{k:"lf",l:"LF/ea"},{k:"qty",l:"Qty"},{k:"totalLF",l:"Total LF"}]}/>
        </div>}
        {tab==="estimate"   &&<EstView est={est} direct={est.direct} bid={est.bid} mk={mk} setMk={setMk} overrides={overrides} setOverride={setOverride} miscQty={miscQty} setMiscQty={setMiscQty} pipingQty={pipingQty} setPipingQty={setPipingQty} tk={tk} catMult={catMult} setCatMult={setCatMult}/>}
        {tab==="calibrate"  &&<CalibratePanel upOverrides={upOverrides} upApply={upApply} upReset={upReset}/>}
      </div>
      <div style={{marginTop:14,background:"#f5a6230e",border:"1px solid #f5a62330",borderRadius:10,padding:"12px 16px"}}>
        <div style={{fontSize:10,fontWeight:700,color:"#f5a623",letterSpacing:"0.8px",textTransform:"uppercase",marginBottom:8}}>⚠️ Field Verification Notes</div>
        {tk.warnings.map((w,i)=><div key={i} style={{fontSize:12,color:"#dde3f0",marginBottom:4,paddingLeft:10,borderLeft:"2px solid #f5a62344",lineHeight:1.6}}>{w}</div>)}
      </div>
      </>}
    </div>}
  </div>;
}


// ── Isolated modal components — own their state, never re-render from parent ──
function ManualPOModal({onClose,onSave,projOptions,catOptions,inputStyle,labelStyle,selectStyle}){
  const [vendor,setVendor]=useState("");
  const [amount,setAmount]=useState("");
  const [desc,setDesc]=useState("");
  const [cat,setCat]=useState("Services");
  const [proj,setProj]=useState("");
  const [notes,setNotes]=useState("");
  const [delivery,setDelivery]=useState("");
  return <div style={{position:"fixed",inset:0,background:"#00000099",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
    <div style={{background:"#161b27",border:"1px solid #252d45",borderRadius:14,padding:24,width:"100%",maxWidth:580,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:14,fontWeight:800,color:"#fff",marginBottom:16}}>📝 Create PO Manually</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div><label style={labelStyle}>Vendor *</label><input value={vendor} onChange={e=>setVendor(e.target.value)} placeholder="e.g. JMIL Sheet Metal" style={inputStyle}/></div>
        <div><label style={labelStyle}>Category</label><select value={cat} onChange={e=>setCat(e.target.value)} style={selectStyle}>{catOptions.map(c=><option key={c}>{c}</option>)}</select></div>
        <div><label style={labelStyle}>Amount ($) *</label><input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00" style={inputStyle}/></div>
        <div><label style={labelStyle}>Project</label><select value={proj} onChange={e=>setProj(e.target.value)} style={selectStyle}><option value="">— Unassigned —</option>{projOptions}</select></div>
        <div style={{gridColumn:"1/-1"}}><label style={labelStyle}>Description</label><input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="What is this purchase for?" style={inputStyle}/></div>
        <div><label style={labelStyle}>Delivery Date</label><input value={delivery} onChange={e=>setDelivery(e.target.value)} placeholder="e.g. April 15, 2026" style={inputStyle}/></div>
        <div><label style={labelStyle}>Notes</label><input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Any additional notes" style={inputStyle}/></div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
        <button onClick={onClose} style={{padding:"7px 16px",background:"transparent",border:"1px solid #252d45",borderRadius:8,color:"#6b7694",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
        <button onClick={()=>onSave(vendor,amount,desc,cat,proj,notes,delivery)} style={{padding:"7px 18px",background:"#3d8ef822",border:"1px solid #3d8ef855",borderRadius:8,color:"#3d8ef8",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Create PO</button>
      </div>
    </div>
  </div>;
}

function QuickAddModal({onClose,onSave,projOptions,catOptions,inputStyle,labelStyle,selectStyle,fmt}){
