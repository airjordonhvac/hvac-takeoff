        <button onClick={()=>setShowApiKey(true)} style={{padding:"6px 12px",background:apiKey?"#2ecc8718":"#f5a62318",border:`1px solid ${apiKey?"#2ecc8744":"#f5a62344"}`,borderRadius:7,color:apiKey?"#2ecc87":"#f5a623",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{apiKey?"Г°ВҹВ”В‘ Key ГўВңВ“":"Г°ВҹВ”В‘ API Key"}</button>
        <button onClick={()=>setShowNewProj(true)} style={{padding:"6px 12px",background:"#2ecc8718",border:"1px solid #2ecc8744",borderRadius:7,color:"#2ecc87",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Project</button>
        <button onClick={()=>setShowManualPO(true)} style={{padding:"6px 12px",background:"#3d8ef818",border:"1px solid #3d8ef844",borderRadius:7,color:"#3d8ef8",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Г°ВҹВ“Вқ Manual PO</button>
        <button onClick={()=>setShowQuickAdd(true)} style={{padding:"6px 12px",background:"#c084fc18",border:"1px solid #c084fc44",borderRadius:7,color:"#c084fc",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>ГўВҡВЎ Quick Add</button>
      </div>
    </div>

    {/* ГўВ”ВҖГўВ”ВҖ Sub-tabs ГўВ”ВҖГўВ”ВҖ */}
    <div style={{display:"flex",gap:2,borderBottom:"1px solid #252d45",marginBottom:16}}>
      {[{k:"gen",l:"ГўВҡВЎ Generate"},{k:"projects",l:"Г°ВҹВ“ВҒ Projects"},{k:"all",l:"Г°ВҹВ“ВӢ All POs"},{k:"margin",l:"Г°ВҹВ“ВҠ Margin"},{k:"import",l:"Г°ВҹВ“ВҘ Import Quote"}].map(t=>
        <button key={t.k} onClick={()=>{setPopsTab(t.k);setActivePOId(null);setActiveProjId(null);}} style={{padding:"7px 14px",background:"transparent",border:"none",borderBottom:popsTab===t.k?"2px solid #5b8dee":"2px solid transparent",color:popsTab===t.k?"#5b8dee":"#6b7694",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{t.l}</button>
      )}
    </div>

    {/* ГўВ”ВҖГўВ”ВҖ PO Detail overlay ГўВ”ВҖГўВ”ВҖ */}
    {activePO&&<PODetail po={activePO}/>}

    {/* ГўВ”ВҖГўВ”ВҖ Generate tab ГўВ”ВҖГўВ”ВҖ */}
    {!activePO&&popsTab==="gen"&&<div>
      <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:4}}>Generate Purchase Order</div>
      <div style={{fontSize:12,color:"#6b7694",marginBottom:16}}>Use AI to generate a PO from plain English, or create one manually.</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 200px",gap:12,marginBottom:12}}>
        <textarea value={genInput} onChange={e=>setGenInput(e.target.value)} placeholder={'e.g. "50 Trane RTUs at $1,800/ton for Total Wine Tulsa"\nor "JMIL sheet metal fab for Crunch Fitness $37,813"'}
          style={{background:"#1c2235",border:"1px solid #252d45",borderRadius:8,color:"#dde3f0",fontSize:13,padding:12,resize:"none",height:100,fontFamily:"inherit",outline:"none"}}/>
        <div>
          <label style={labelStyle}>Assign to Project</label>
          <select value={genProjSel} onChange={e=>setGenProjSel(e.target.value)} style={{...selectStyle,marginBottom:8}}><option value="">Auto-detect</option>{projOptions}</select>
          <div style={{fontSize:10,color:"#6b7694",lineHeight:1.6}}>Projects marked ГўВҶВ— are from your Takeoff app</div>
        </div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}>
        <button onClick={generatePO} disabled={genLoading||!genInput.trim()} style={{padding:"9px 20px",background:genLoading?"#252d45":"#5b8dee",border:"none",borderRadius:7,color:"#fff",fontSize:12,fontWeight:700,cursor:genLoading?"not-allowed":"pointer",fontFamily:"inherit",letterSpacing:"0.05em"}}>{genLoading?"GeneratingГўВҖВҰ":"ГўВҡВЎ AI Generate PO"}</button>
        <button onClick={()=>setShowManualPO(true)} style={{padding:"9px 18px",background:"#252d45",border:"1px solid #252d45",borderRadius:7,color:"#dde3f0",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Г°ВҹВ“Вқ Manual</button>
      </div>
      {genError&&<div style={{padding:"10px 14px",background:"#ff5c5c10",border:"1px solid #ff5c5c33",borderRadius:7,fontSize:12,color:"#ff5c5c",marginBottom:12}}>{genError}</div>}
      {/* Recent POs */}
      {poList.length>0&&<><div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:8}}>Recent POs</div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {poList.slice().reverse().slice(0,8).map(p=><div key={p.id} onClick={()=>setActivePOId(p.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#161b27",border:"1px solid #252d45",borderRadius:8,cursor:"pointer"}}>
          <span style={{fontFamily:"monospace",fontSize:10,color:"#5b8dee",minWidth:52}}>PO-{p.num}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:"#dde3f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.vendor}</div>
            <div style={{fontSize:10,color:"#6b7694"}}>{p.category} ГӮВ· {projName(p.projectId)}</div>
          </div>
          {statusBadge(p.status)}
          <span style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:"#2ecc87",flexShrink:0}}>${p.total.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
        </div>)}
      </div></>}
    </div>}

    {/* ГўВ”ВҖГўВ”ВҖ Projects tab ГўВ”ВҖГўВ”ВҖ */}
    {!activePO&&popsTab==="projects"&&<div>
      <div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:10}}>
        Active Projects ГўВҖВ” Awarded &amp; In Progress
      </div>
      {mergedProjects.length===0&&<div style={{fontSize:13,color:"#6b7694",fontStyle:"italic",padding:"20px 0"}}>No active projects. Projects set to Awarded or In Progress will appear here automatically.</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
        {mergedProjects.map(p=>{
          const spent=projSpent(p.id);
          const pos=poList.filter(x=>x.projectId===p.id);
          const rev=parseFloat(allStatus&&allStatus[p.id]?.contractValue)||0;
          const gm=rev-spent;
          const gmPct=rev>0?gm/rev*100:null;
          const gmC=gmPct===null?"#6b7694":gmPct>=25?"#2ecc87":gmPct>=15?"#f5a623":gmPct>=5?"#fb923c":"#ff5c5c";
          return <div key={p.id} onClick={()=>{setActiveProjId(p.id);setPopsTab("all");}} style={{background:"#161b27",border:"1px solid #252d45",borderRadius:10,padding:"14px 16px",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{fontSize:13,fontWeight:700,color:"#dde3f0",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginRight:8}}>{p.name}</div>
              <span style={{fontSize:9,color:p.source==="takeoff"?"#5b8dee":"#c084fc",background:p.source==="takeoff"?"#5b8dee18":"#c084fc18",border:`1px solid ${p.source==="takeoff"?"#5b8dee44":"#c084fc44"}`,borderRadius:3,padding:"1px 5px",fontWeight:700,flexShrink:0}}>{pos.length} POs</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
              <div>
                <div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:"#fb923c"}}>{`$${spent.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`} costs</div>
                {rev>0&&<div style={{fontFamily:"monospace",fontSize:11,color:"#3d8ef8",marginTop:1}}>{`$${rev.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`} revenue</div>}
              </div>
              {rev>0&&<div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:"#6b7694",fontWeight:700,letterSpacing:"0.3px",textTransform:"uppercase"}}>GM</div>
                <div style={{fontSize:13,fontWeight:800,color:gmC}}>{gmPct!==null?`${gmPct.toFixed(1)}%`:"ГўВҖВ”"}</div>
              </div>}
            </div>
            {p.source==="takeoff"&&<div style={{fontSize:9,color:"#5b8dee",marginTop:4}}>ГўВҶВ— from Takeoff</div>}
          </div>;
        })}
      </div>
    </div>}

    {/* ГўВ”ВҖГўВ”ВҖ All POs tab ГўВ”ВҖГўВ”ВҖ */}
    {!activePO&&popsTab==="all"&&<div>
      {activeProjId&&<button onClick={()=>setActiveProjId(null)} style={{background:"transparent",border:"none",color:"#6b7694",cursor:"pointer",fontSize:12,fontFamily:"inherit",marginBottom:10,padding:0}}>ГўВҶВҗ All Projects</button>}
      <div style={{fontSize:10,color:"#6b7694",fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:10}}>
        {activeProjId?`POs for ${projName(activeProjId)}`:`All POs (${poList.length})`}
      </div>
      {(activeProjId?poList.filter(p=>p.projectId===activeProjId):poList).length===0&&<div style={{fontSize:13,color:"#6b7694",fontStyle:"italic",padding:"20px 0"}}>No POs yet.</div>}
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {(activeProjId?poList.filter(p=>p.projectId===activeProjId):poList).slice().reverse().map(p=>
          <div key={p.id} onClick={()=>setActivePOId(p.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#161b27",border:"1px solid #252d45",borderRadius:8,cursor:"pointer"}}>
            <span style={{fontFamily:"monospace",fontSize:10,color:"#5b8dee",minWidth:52}}>PO-{p.num}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:"#dde3f0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.vendor}</div>
              <div style={{fontSize:10,color:"#6b7694"}}>{p.category} ГӮВ· <span style={{color:"#c084fc"}}>{projName(p.projectId)}</span> ГӮВ· {p.date}</div>
            </div>
            {statusBadge(p.status)}
            <span style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:"#2ecc87",flexShrink:0}}>{fmt(p.total)}</span>
          </div>
        )}
      </div>
    </div>}

    {/* ГўВ”ВҖГўВ”ВҖ Margin tab ГўВ”ВҖГўВ”ВҖ */}
    {!activePO&&popsTab==="margin"&&<MarginTab allProjectsForDisplay={allProjectsForDisplay} allStatus={allStatus} poList={poList} projName={projName} projSpent={projSpent} popsDbSave={popsDbSave}/>}

{!activePO&&popsTab==="import"&&<div style={{padding:"2px 0"}}>
  <div style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:4}}>Import Quote</div>
  <div style={{fontSize:12,color:"#6b7694",marginBottom:14}}>Paste or upload a vendor quote ГўВҖВ” AI extracts line items, then you assign the project.</div>

  <div style={{display:"flex",gap:0,borderBottom:"1px solid #252d45",marginBottom:16}}>
    {[{k:"paste",l:"Paste Text"},{k:"pdf",l:"Upload PDF"}].map(m=>
      <button key={m.k} onClick={()=>{setImpMode(m.k);setImpError("");}} style={{padding:"7px 14px",background:"transparent",border:"none",borderBottom:impMode===m.k?"2px solid #5b8dee":"2px solid transparent",color:impMode===m.k?"#5b8dee":"#6b7694",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{m.l}</button>
    )}
  </div>

  {impMode==="paste"&&<div>
    <textarea value={impText} onChange={e=>setImpText(e.target.value)}
      placeholder="Paste full quote or email text here..."
      style={{width:"100%",minHeight:160,background:"#0e1525",border:"1px solid #252d45",borderRadius:8,color:"#e2e8f0",padding:12,fontSize:12,fontFamily:"monospace",resize:"vertical",outline:"none",boxSizing:"border-box",lineHeight:1.6}}/>
    <button
      onClick={()=>{
  if(!impText.trim()){setImpError("Paste some text first.");return;}
  setImpLoading(true);setImpError("");setImpParsed(null);
  const sys="Extract vendor quote data. Return ONLY valid JSON: {\"vendor\":\"\",\"quoteRef\":\"\",\"quoteDate\":\"\",\"lineItems\":[{\"description\":\"\",\"qty\":1,\"unitPrice\":0}],\"subtotal\":0,\"tax\":0,\"total\":0,\"notes\":\"\",\"validUntil\":\"\"}";
  fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content:"Parse this vendor quote:\n\n"+impText}]})})
  .then(r=>r.json())
  .then(d=>{try{const t=(d.content&&d.content[0]&&d.content[0].text)||"{}";const c=t.replace(/```json|```/g,"").trim();setImpParsed(JSON.parse(c));}catch(e){setImpError("Parse error ГўВҖВ” check quote format.");}setImpLoading(false);})
  .catch(e=>{setImpError("Network error: "+e.message);setImpLoading(false);});
}}
      disabled={impLoading}
      style={{marginTop:10,padding:"9px 20px",background:impLoading?"#252d45":"#5b8dee",color:"#fff",border:"none",borderRadius:7,fontWeight:700,fontSize:13,cursor:impLoading?"not-allowed":"pointer",fontFamily:"inherit"}}>
      {impLoading?"Parsing...":"Parse Quote"}
    </button>
  </div>}

  {impMode==="pdf"&&<div>
    <label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",border:"2px dashed #252d45",borderRadius:10,padding:"28px 20px",cursor:"pointer",background:"#0e1525",gap:8}}
      onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#5b8dee";}}
      onDragLeave={e=>{e.currentTarget.style.borderColor="#252d45";}}
      onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="#252d45";var f=e.dataTransfer.files[0];if(f&&f.type==="application/pdf")window.__processPopsQuotePDF(f,t=>{setImpText(t);setImpMode("paste");},setImpPdfLoading,setImpError);else setImpError("Please drop a PDF file.");}}>
      <input type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{var f=e.target.files[0];if(f)window.__processPopsQuotePDF(f,t=>{setImpText(t);setImpMode("paste");},setImpPdfLoading,setImpError);}}/>
      <div style={{fontSize:28}}>PDF</div>
      <div style={{color:"#e2e8f0",fontWeight:600,fontSize:14}}>Drop PDF here or click to browse</div>
      <div style={{color:"#6b7694",fontSize:12}}>Text will be extracted then parsed</div>
      {impPdfLoading&&<div style={{color:"#5b8dee",fontSize:12}}>Reading PDF...</div>}
    </label>
  </div>}

  {impError&&<div style={{marginTop:10,padding:"9px 14px",background:"#2a0a0a",border:"1px solid #6a1a1a",borderRadius:7,color:"#ff8888",fontSize:12}}>{impError}</div>}

  {impParsed&&<div style={{marginTop:18,background:"#0e1525",border:"1px solid #2a3a5a",borderRadius:10,padding:16}}>
    <div style={{fontSize:13,fontWeight:700,color:"#2ecc87",marginBottom:12}}>Quote Parsed</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
      <div>
        <div style={{fontSize:10,color:"#6b7694",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Vendor</div>
        <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{impParsed.vendor||"Unknown"}</div>
        {impParsed.quoteRef&&<div style={{fontSize:11,color:"#6b7694",marginTop:2}}>Ref: {impParsed.quoteRef}</div>}
        {impParsed.quoteDate&&<div style={{fontSize:11,color:"#6b7694"}}>Date: {impParsed.quoteDate}</div>}
        {impParsed.validUntil&&<div style={{fontSize:11,color:"#f5a623"}}>Valid until: {impParsed.validUntil}</div>}
      </div>
      <div>
        <div style={{fontSize:10,color:"#6b7694",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Total</div>
        <div style={{fontSize:18,fontWeight:700,color:"#2ecc87"}}>${(impParsed.total||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
      </div>
    </div>

    {impParsed.lineItems&&impParsed.lineItems.length>0&&<div style={{marginBottom:12}}>
      <div style={{fontSize:10,color:"#6b7694",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Line Items</div>
      <div style={{background:"#141b2d",borderRadius:7,overflow:"hidden"}}>
        {impParsed.lineItems.map((li,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:8,padding:"8px 12px",borderBottom:i<impParsed.lineItems.length-1?"1px solid #252d45":"none",alignItems:"center"}}>
          <div style={{fontSize:12,color:"#e2e8f0"}}>{li.description}</div>
          <div style={{fontSize:11,color:"#6b7694"}}>x{li.qty||1}</div>
          <div style={{fontSize:12,color:"#5b8dee",fontFamily:"monospace"}}>${((li.unitPrice||0)*(li.qty||1)).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        </div>)}
      </div>
    </div>}

    {impParsed.notes&&<div style={{marginBottom:12,padding:"8px 12px",background:"#141b2d",borderRadius:7,fontSize:11,color:"#8892a4",borderLeft:"3px solid #252d45"}}>{impParsed.notes}</div>}

    <div style={{marginBottom:14}}>
      <div style={{fontSize:10,color:"#6b7694",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Assign to Project</div>
      <select value={impProjSel} onChange={e=>setImpProjSel(e.target.value)}
        style={{width:"100%",background:"#141b2d",border:"1px solid #252d45",color:impProjSel?"#e2e8f0":"#6b7694",borderRadius:7,padding:"9px 12px",fontSize:13,fontFamily:"inherit",outline:"none"}}>
        <option value="">Select a project...</option>
        {(()=>{
  if(!allProjectsForDisplay) return null;
  const ACTIVE=["Awarded","In Progress","Awarded - In Progress","In Progress - Awarded"];
  const seen=new Set();
  return allProjectsForDisplay
    .filter(p=>{
      if(!p||!p.name) return false;
      if(seen.has(p.name)){return false;} seen.add(p.name);
      const raw=allStatus&&(allStatus[p.key]||allStatus[p.id]||allStatus[p.name]||"");
      const s=typeof raw==="object"?raw.status||"":raw;
      return ACTIVE.includes(s);
    })
    .sort((a,b)=>a.name.localeCompare(b.name))
    .map(p=><option key={p.id||p.key||p.name} value={p.id||p.key||p.name}>{p.name}</option>);
})()}
      </select>
    </div>

    <div style={{display:"flex",gap:10}}>
      <button
        onClick={()=>{
          if(!impProjSel){setImpError("Select a project first.");return;}
          var tot=impParsed.total||impParsed.subtotal||(impParsed.lineItems||[]).reduce(function(s,li){return s+(li.unitPrice||0)*(li.qty||1);},0);
          var desc=(impParsed.lineItems||[]).map(function(li){return li.description;}).filter(Boolean).join("; ")||impParsed.vendor+" Quote";
          var notes=[impParsed.quoteRef?"Ref: "+impParsed.quoteRef:"",impParsed.quoteDate?"Date: "+impParsed.quoteDate:"",impParsed.validUntil?"Valid until: "+impParsed.validUntil:"",impParsed.notes||""].filter(Boolean).join(" | ");
          saveManualPO(impParsed.vendor,tot,desc,"Materials",impProjSel,notes,"");
          setImpParsed(null);setImpText("");setImpProjSel("");setImpError("");
          setPopsTab("all");
        }}
        style={{flex:1,padding:"10px 20px",background:"#2ecc87",color:"#0a1628",border:"none",borderRadius:7,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Save as PO</button>
      <button onClick={()=>{setImpParsed(null);setImpText("");setImpProjSel("");setImpError("");}}
        style={{padding:"10px 16px",background:"transparent",color:"#6b7694",border:"1px solid #252d45",borderRadius:7,fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Clear</button>
    </div>
  </div>}
</div>}

  </div>;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PinGate><App /></PinGate>);
</script>
